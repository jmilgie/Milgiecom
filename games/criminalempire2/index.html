<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Criminal Empire II | Milgie Games</title>
  <meta name="description" content="Criminal Empire II is a mobile-first synthwave crime strategy sequel for Milgie.com." />
  <meta name="theme-color" content="#0c0618" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Oxanium:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="preload" href="../assets/catalog/criminal-empire-ii.png" as="image" type="image/png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="intro-screen" id="introScreen">
    <div class="intro-panel">
      <div class="intro-art"></div>
      <div class="intro-copy">
        <div class="deck-kicker">Milgie Crime Strategy</div>
        <h1>Criminal Empire II</h1>
        <p>Own the night. Wash the cash. Crack the city before the city buries your name in a sealed vault.</p>
        <div class="intro-pills">
          <span>6 districts</span>
          <span>crew management</span>
          <span>multi-step heists</span>
          <span>legacy loop</span>
        </div>
        <button class="neon-btn big" id="introStart" type="button">Enter the skyline</button>
        <a class="back-link" href="../">Back to Games</a>
      </div>
    </div>
  </div>

  <div class="sunset"></div>
  <div class="horizon-grid"></div>
  <div class="skyline"></div>
  <div class="scanlines"></div>
  <div class="noise"></div>

  <div class="shell" id="appShell">
    <header class="topbar frame">
      <div class="brand-lockup">
        <div class="brand-stack">
          <span class="brand-kicker">Milgie Games</span>
          <span class="brand-title">Criminal Empire II</span>
        </div>
        <a class="back-link" href="../">Games</a>
      </div>
      <div class="summary-strip" id="summaryStrip"></div>
      <div class="top-actions">
        <button class="top-action" id="musicToggle" type="button" data-action="toggle-music">Music On</button>
        <button class="top-action" id="soundToggle" type="button" data-action="toggle-sound">SFX On</button>
        <button class="top-action" id="saveButton" type="button" data-action="save">Save</button>
      </div>
    </header>

    <section class="command-grid">
      <div class="frame hero-frame" id="heroDeck"></div>
      <div class="frame status-frame" id="statusDeck"></div>
    </section>

    <section class="stage-grid">
      <div class="frame map-frame">
        <div class="section-head inline">
          <h2>City Grid</h2>
          <span>Tap a district to focus</span>
        </div>
        <div id="cityMap"></div>
        <div id="districtPeek"></div>
      </div>
      <aside class="frame rail-frame" id="liveRail"></aside>
    </section>

    <section class="frame main-frame">
      <nav class="dock-tabs" id="dockTabs"></nav>
      <div id="panelRoot"></div>
    </section>
  </div>

  <div id="overlayRoot"></div>
  <div class="toast-root" id="toastRoot"></div>

  <script type="module" src="./js/main.mjs"></script>
</body>
</html>
