<html lang="en">
<head>

  <title>Rogue Consumables Checklist</title>

    <style>
    :root{
      --bg:#0e0a07;
      --line:rgba(242,196,124,.13);--line2:rgba(242,196,124,.07);
      --text:#f0e2c6;--muted:#b89a72;--soft:#7a6448;

      --imp:#d6a34f;
      --r:18px;--r2:12px;--r3:8px;

    html{color-scheme:dark;scroll-behavior:smooth}
    body{

      font:15px/1.5 ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);

      min-height:100vh;
    }
    body.modal-open{overflow:hidden}
    button,input{font:inherit;-webkit-appearance:none}
    img{display:block}
    .page{width:min(960px,100%);margin:0 auto;padding:0 0 48px}
    .hero{
      position:sticky;top:0;z-index:20;
      padding:max(10px,env(safe-area-inset-top)) 14px 0;
      background:rgba(9,6,3,.93);
      backdrop-filter:blur(18px) saturate(1.5);
      -webkit-backdrop-filter:blur(18px) saturate(1.5);
      border-bottom:1px solid var(--line);
      box-shadow:0 3px 18px rgba(0,0,0,.45);
    }
    .hero-top{display:flex;align-items:center;gap:8px;padding-bottom:8px}
    .eyebrow{
      display:inline-flex;padding:3px 9px;
      border:1px solid rgba(255,214,148,.2);border-radius:999px;
      color:var(--gold);background:rgba(255,214,148,.07);
      font-size:10px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;
      white-space:nowrap;flex-shrink:0;
    }
    h1{
      margin:0;flex:1;min-width:0;
      font-size:clamp(1.1rem,3.5vw,1.65rem);line-height:1;letter-spacing:-.03em;
      background:linear-gradient(135deg,var(--gold3) 0%,var(--gold) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .hero-btns{display:flex;gap:6px;flex-shrink:0}
    .btn{
      appearance:none;cursor:pointer;border-radius:999px;
      font-weight:700;font-size:12px;padding:6px 12px;
      transition:var(--t);white-space:nowrap;
      border:1px solid rgba(241,198,126,.22);
      background:linear-gradient(180deg,rgba(100,66,28,.9),rgba(48,30,10,.95));
      color:var(--gold2);
    }
    .btn:hover{filter:brightness(1.15);border-color:rgba(241,198,126,.4)}
    .btn:active{transform:scale(.96)}
    .btn.ghost{background:rgba(255,240,212,.04);border-color:rgba(255,240,212,.1);color:var(--muted)}
    .btn.ghost:hover{background:rgba(255,240,212,.09);color:var(--text)}
    .stats-bar{
      display:flex;align-items:center;gap:10px;
      padding:7px 12px;
      background:rgba(255,240,212,.025);
      border-top:1px solid var(--line2);
    }
    .stat-item{display:flex;flex-direction:column;gap:0;min-width:0;flex-shrink:0}
    .stat-label{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--soft)}
    .stat-value{font-size:.95rem;font-weight:900;color:var(--gold2);letter-spacing:-.02em;line-height:1.1}
    .stat-div{width:1px;height:24px;background:var(--line2);flex-shrink:0}
    .progress-wrap{flex:1;min-width:50px}
    .progress{height:5px;border-radius:999px;background:rgba(255,240,212,.07);overflow:hidden;margin-top:3px}
    .progress>span{display:block;height:100%;width:0;background:linear-gradient(90deg,#b8711a,#f0d060 60%,#80d4a0);transition:width .45s cubic-bezier(.4,0,.2,1)}
    .pct-label{font-size:9px;color:var(--muted);text-align:right;font-weight:700;line-height:1}
    .filters-bar{
      padding:7px 14px 0;
      background:rgba(9,6,3,.93);
      backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
      border-bottom:1px solid var(--line2);
    }
    .filters{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
    .filters::-webkit-scrollbar{display:none}
    .filter{
      flex:0 0 auto;border:1px solid rgba(255,240,212,.09);
      background:rgba(255,240,212,.04);color:var(--muted);
      border-radius:999px;padding:5px 12px;cursor:pointer;
      font-weight:700;font-size:12px;transition:var(--t);white-space:nowrap;
    }
    .filter:hover{background:rgba(255,240,212,.09);color:var(--text)}
    .filter.active{
      background:linear-gradient(180deg,#eecb6a,#c07d18);
      color:#1a0c00;border-color:transparent;font-weight:800;
      box-shadow:0 2px 8px rgba(200,130,30,.35);
    }
    .content{padding:12px 14px 0}
    .sections{display:grid;gap:10px}
    .section{
      border:1px solid var(--line);border-radius:var(--r);
      overflow:hidden;
      background:linear-gradient(180deg,rgba(20,13,8,.98),rgba(10,7,4,1));
      box-shadow:var(--sh);
    }
    .section[hidden]{display:none!important}
    .section-head{
      display:flex;justify-content:space-between;align-items:center;gap:10px;
      padding:10px 13px;border-bottom:1px solid var(--line2);
      background:linear-gradient(180deg,rgba(36,24,14,.92),rgba(20,13,8,.98));
      cursor:pointer;user-select:none;
    }
    .section-head:hover{background:linear-gradient(180deg,rgba(46,30,16,.92),rgba(28,18,10,.98))}
    .sh-left{min-width:0;flex:1}
    .sh-left h2{margin:0;font-size:.88rem;font-weight:800;letter-spacing:-.01em;line-height:1.25}
    .sh-left p{margin:2px 0 0;color:var(--muted);font-size:.75rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .sh-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
    .count{
      display:inline-flex;align-items:center;
      padding:3px 9px;border-radius:999px;
      color:var(--gold);background:rgba(255,209,137,.05);
      border:1px solid rgba(255,209,137,.12);font-weight:800;font-size:11px;white-space:nowrap;
    }
    .count.done{color:var(--ok);background:var(--okbg);border-color:var(--okline)}
    .chevron{
      width:16px;height:16px;display:flex;align-items:center;justify-content:center;
      color:var(--soft);transition:transform .2s ease;font-size:10px;
    }
    .section.collapsed .chevron{transform:rotate(-90deg)}
    .section.collapsed .rows{display:none}
    .rows{display:grid;gap:1px;background:rgba(255,240,212,.04)}
    .row{
      display:grid;
      grid-template-columns:32px minmax(0,1fr) auto;
      gap:8px;align-items:center;
      padding:9px 13px;
      background:linear-gradient(180deg,rgba(17,11,7,.98),rgba(9,6,3,1));
      transition:background .12s;
      position:relative;
    }
    .row:hover{background:linear-gradient(180deg,rgba(26,17,9,.98),rgba(15,10,5,1))}
    .row.complete{background:linear-gradient(180deg,rgba(16,26,18,.98),rgba(9,15,10,1))}
    .row.complete:hover{background:linear-gradient(180deg,rgba(20,32,22,.98),rgba(12,20,13,1))}
    .row.important::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--imp);border-radius:0 2px 2px 0}
    .toggle{
      appearance:none;width:26px;height:26px;flex-shrink:0;
      border-radius:8px;cursor:pointer;
      border:2px solid rgba(255,240,212,.16);
      background:rgba(255,240,212,.04);
      position:relative;transition:var(--t);
    }
    .toggle:hover{border-color:rgba(255,200,90,.35);background:rgba(255,200,90,.07)}
    .toggle:checked{
      background:linear-gradient(145deg,#8ed4a0,#52b06a);
      border-color:transparent;
      box-shadow:0 2px 8px rgba(80,180,100,.3);
    }
    .toggle:checked::after{
      content:"";position:absolute;
      left:7px;top:3px;width:7px;height:11px;
      border-right:2.5px solid #0c1f0f;border-bottom:2.5px solid #0c1f0f;
      transform:rotate(45deg);
    }
    .row-main{min-width:0}
    .row-title{display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin-bottom:4px}
    .row-title h3{margin:0;font-size:.88rem;font-weight:700;line-height:1.2}
    .row.complete .row-title h3{color:var(--ok)}
    .prog-pill{
      display:inline-flex;align-items:center;border-radius:999px;
      padding:1px 6px;font-size:9px;font-weight:800;letter-spacing:.05em;
      background:rgba(214,163,79,.1);border:1px solid rgba(214,163,79,.2);
      color:var(--imp);text-transform:uppercase;
    }
    .items{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:3px}
    .item{
      display:inline-flex;align-items:center;gap:5px;
      border:1px solid rgba(255,240,212,.09);
      background:rgba(255,240,212,.025);
      border-radius:var(--r3);
      padding:3px 7px 3px 3px;
      cursor:pointer;color:inherit;text-align:left;
      transition:var(--t);
    }
    .item:hover{background:rgba(255,240,212,.07);border-color:rgba(255,240,212,.17);transform:translateY(-1px)}
    .item:active{transform:translateY(0)}
    .item span{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}
    .icon{width:24px;height:24px;border-radius:5px;object-fit:cover;background:#1a0e07;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.07)}
    .q1 .item{border-color:rgba(200,200,200,.1)} .q1 .item span{color:#c0c0c0}
    .q2 .item{border-color:rgba(30,255,0,.1)} .q2 .item span{color:#1eff00}
    .q3 .item{border-color:rgba(77,171,247,.12)} .q3 .item span{color:#4dabf7}
    .q4 .item{border-color:rgba(200,117,247,.12)} .q4 .item span{color:#c875f7}
    .q5 .item{border-color:rgba(255,154,60,.12)} .q5 .item span{color:#ff9a3c}
    .q6 .item{border-color:rgba(230,204,128,.12)} .q6 .item span{color:#e6cc80}
    .meta-line{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
    .meta{
      display:inline-flex;align-items:center;border-radius:999px;
      padding:1px 6px;font-size:10px;font-weight:600;
      background:rgba(255,240,212,.03);border:1px solid rgba(255,240,212,.07);color:var(--soft);
    }
    .meta.enc{color:#9ad0ef;border-color:rgba(91,147,186,.18);background:rgba(28,50,70,.22)}
    .row-side{display:flex;align-items:center;gap:7px;flex-shrink:0}
    .need-box{display:flex;flex-direction:column;align-items:center;gap:1px}
    .need-lbl{font-size:9px;color:var(--soft);font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .need-val{font-size:1rem;font-weight:900;color:var(--muted);line-height:1}
    .stepper{display:flex;flex-direction:column;align-items:center;gap:2px}
    .stepper-lbl{font-size:9px;color:var(--soft);font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .stepper-row{display:flex;align-items:center}
    .step-btn{
      appearance:none;width:24px;height:26px;
      border:1px solid rgba(255,240,212,.1);
      background:rgba(255,240,212,.04);color:var(--muted);
      cursor:pointer;font-size:14px;font-weight:900;transition:var(--t);
      display:flex;align-items:center;justify-content:center;line-height:1;padding:0;
    }
    .step-btn:hover{background:rgba(255,240,212,.1);color:var(--text)}
    .step-btn:active{background:rgba(255,240,212,.16)}
    .step-btn.minus{border-radius:6px 0 0 6px;border-right:none}
    .step-btn.plus{border-radius:0 6px 6px 0;border-left:none}
    .step-val{
      width:30px;height:26px;
      border-top:1px solid rgba(255,240,212,.1);border-bottom:1px solid rgba(255,240,212,.1);
      border-left:none;border-right:none;
      background:rgba(8,5,2,.85);color:var(--text);
      text-align:center;font-weight:800;font-size:13px;outline:none;
    }
    .step-val:focus{background:rgba(20,13,6,.95)}
    .status-dot{
      display:inline-flex;align-items:center;justify-content:center;
      border-radius:7px;font-weight:800;letter-spacing:.04em;
      text-transform:uppercase;font-size:9px;
      padding:3px 7px;white-space:nowrap;
    }
    .status-dot.missing{color:var(--warn);border:1px solid var(--warnline);background:var(--warnbg)}
    .status-dot.ready{color:var(--ok);border:1px solid var(--okline);background:var(--okbg)}
    .modal{
      position:fixed;inset:0;z-index:50;
      display:none;align-items:flex-end;justify-content:center;
      background:rgba(0,0,0,.74);
      backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
    }
    .modal.open{display:flex}
    .sheet{
      width:min(660px,100%);
      max-height:min(82vh,850px);overflow-y:auto;
      border-radius:22px 22px 0 0;
      border:1px solid rgba(255,240,212,.12);border-bottom:none;
      background:linear-gradient(180deg,rgba(26,17,10,.99),rgba(9,6,3,1));
      box-shadow:var(--sh2);
      padding-bottom:env(safe-area-inset-bottom);
    }
    @media(min-width:500px){.sheet{border-radius:20px;margin:14px;max-height:min(85vh,850px)}}
    .sheet-head{
      display:flex;gap:11px;align-items:center;
      padding:14px;border-bottom:1px solid var(--line);
      position:sticky;top:0;
      background:rgba(22,14,8,.98);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    }
    .sheet-icon{width:40px;height:40px;border-radius:9px;object-fit:cover;background:#1a0e07;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.09),0 3px 10px rgba(0,0,0,.4)}
    .sheet-info{flex:1;min-width:0}
    .sheet-info h2{margin:0 0 2px;font-size:.95rem;font-weight:800;line-height:1.2}
    .sheet-sub{color:var(--muted);font-size:.78rem}
    .close{
      width:30px;height:30px;border-radius:999px;
      border:1px solid rgba(255,240,212,.11);
      background:rgba(255,240,212,.05);
      color:var(--muted);cursor:pointer;font-size:14px;
      display:flex;align-items:center;justify-content:center;
      transition:var(--t);flex-shrink:0;
    }
    .close:hover{background:rgba(255,240,212,.1);color:var(--text)}
    .sheet-body{padding:14px}
    .tooltip{width:100%;color:var(--text)}
    .tooltip table{width:100%;border-collapse:collapse}
    .tooltip td,.tooltip th{padding:1px 0;vertical-align:top;text-align:left;font-weight:400}
    .tooltip th{width:0;background:none!important;white-space:nowrap;padding-right:8px;color:var(--muted)}
    .tooltip td{line-height:1.5}
    .foot{margin:18px 14px 0;color:var(--soft);font-size:.75rem;text-align:center;opacity:.65}
    @media(max-width:560px){
      .hero,.filters-bar,.content{padding-left:10px;padding-right:10px}
      h1{font-size:1.05rem}
      .stats-bar{gap:7px;padding:6px 10px}
      .stat-value{font-size:.88rem}
      .row{grid-template-columns:26px minmax(0,1fr);padding:8px 10px;gap:6px}
      .row-side{grid-column:2}
      .sh-left p{display:none}
      .item span{max-width:110px}
    }
    @media(max-width:360px){.eyebrow{display:none}}
    @keyframes flashOk{0%{background-color:rgba(80,170,100,.12)}100%{background-color:transparent}}
    .row.just-done{animation:flashOk .5s ease}
  </style>

  <script>
    (() => {
      const storageKey = 'rogue-consumables-standalone-v1';
      const data = JSON.parse(document.getElementById('rogueConsumablesData').textContent);
      const els = {
        sections: document.getElementById('sections'),
        filters: document.getElementById('filters'),
        complete: document.getElementById('completeCount'),
        visible: document.getElementById('visibleCount'),
        percent: document.getElementById('percentValue'),
        packed: document.getElementById('packedTotal'),
        fill: document.getElementById('progressFill'),
        modal: document.getElementById('tooltipModal'),
        tooltipIcon: document.getElementById('tooltipIcon'),
        tooltipTitle: document.getElementById('tooltipTitle'),
        tooltipSubtitle: document.getElementById('tooltipSubtitle'),
        tooltipBody: document.getElementById('tooltipBody')
      };
      let activeFilter = 'all';
      let state = loadState();

      function loadState() { try { return JSON.parse(localStorage.getItem(storageKey) || '{}') || {}; } catch { return {}; } }
      function saveState() { localStorage.setItem(storageKey, JSON.stringify(state)); }
      function rowState(id) { return state[id] || { ready: false, have: 0 }; }
      function visibleRows() { return data.sections.flatMap((s) => s.rows).filter(isVisible); }
      function isVisible(row) { return activeFilter === 'all' || row.tags.includes(activeFilter); }
      function isComplete(row) { const current = rowState(row.id); return Boolean(current.ready) || Number(current.have || 0) >= Number(row.required || 0); }
      function esc(value) { return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
      function openTooltip(item) {
        els.tooltipIcon.src = item.iconDataUrl;
        els.tooltipIcon.alt = item.name;
        els.tooltipTitle.textContent = item.name;
        els.tooltipSubtitle.textContent = 'Embedded item tooltip';
        els.tooltipBody.innerHTML = item.tooltipHtml || '<p>No tooltip data available.</p>';
        els.modal.classList.add('open');
        els.modal.setAttribute('aria-hidden', 'false');
        document.body.classList.add('modal-open');
      }
      function closeTooltip() {
        els.modal.classList.remove('open');
        els.modal.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('modal-open');
      }
      function renderFilters() {
        els.filters.innerHTML = '';
        data.filters.forEach((filter) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'filter' + (filter.id === activeFilter ? ' active' : '');
          button.textContent = filter.label;
          button.addEventListener('click', () => { activeFilter = filter.id; render(); });
          els.filters.appendChild(button);
        });
      }
      function renderRow(row) {
        var current = rowState(row.id);
        var complete = isComplete(row);
        var haveVal = Number(current.have || 0);
        var rowEl = document.createElement("article");
        rowEl.className = "row" + (complete ? " complete" : "") + (row.important ? " important" : "");
        var itemsHtml = "";
        row.items.forEach(function(item, i) {
          itemsHtml += "<button type=\"button\" class=\"item q" + Number(item.quality||1) + "\" data-idx=\"" + i + "\"><img class=\"icon\" src=\"" + item.iconDataUrl + "\" alt=\"\"><span>" + esc(item.name) + "</span></button>";
          if (i < row.items.length - 1) itemsHtml += "<span class=\"meta\" style=\"padding:1px 5px;font-size:10px\">or</span>";
        });
        rowEl.innerHTML =
          "<input class=\"toggle\" type=\"checkbox\" aria-label=\"Mark ready\"" + (current.ready ? " checked" : "") + ">" +
          "<div class=\"row-main\">" +
            "<div class=\"row-title\"><h3>" + esc(row.title) + "</h3>" + (row.important ? "<span class=\"prog-pill\">Key</span>" : "") + "</div>" +
            "<div class=\"items\">" + itemsHtml + "</div>" +
            "<div class=\"meta-line\">" +
              row.notes.map(function(n){return "<span class=\"meta\">" + esc(n) + "</span>";}).join("") +
              row.encounters.map(function(e){return "<span class=\"meta enc\">" + esc(e) + "</span>";}).join("") +
            "</div>" +
          "</div>" +
          "<div class=\"row-side\">" +
            "<div class=\"need-box\"><span class=\"need-lbl\">Need</span><span class=\"need-val\">" + row.required + "</span></div>" +
            "<div class=\"stepper\">" +
              "<span class=\"stepper-lbl\">Have</span>" +
              "<div class=\"stepper-row\">" +
                "<button type=\"button\" class=\"step-btn minus\" aria-label=\"Decrease\">&#8722;</button>" +
                "<input class=\"step-val\" type=\"number\" min=\"0\" step=\"1\" value=\"" + haveVal + "\" aria-label=\"Have count\">" +
                "<button type=\"button\" class=\"step-btn plus\" aria-label=\"Increase\">+</button>" +
              "</div>" +
            "</div>" +
            "<div class=\"status-dot " + (complete ? "ready" : "missing") + "\">" + (complete ? "Ready" : "Need") + "</div>" +
          "</div>";
        row.items.forEach(function(item, i) {
          rowEl.querySelectorAll(".item")[i].addEventListener("click", function(){ openTooltip(item); });
        });
        var toggle = rowEl.querySelector(".toggle");
        var input = rowEl.querySelector(".step-val");
        var minusBtn = rowEl.querySelector(".step-btn.minus");
        var plusBtn = rowEl.querySelector(".step-btn.plus");
        var statusEl = rowEl.querySelector(".status-dot");
        var sync = function(flash) {
          var completeNow = isComplete(row);
          if (flash && completeNow && !rowEl.classList.contains("complete")) {
            rowEl.classList.add("just-done");
            rowEl.addEventListener("animationend", function(){ rowEl.classList.remove("just-done"); }, {once:true});
          }
          rowEl.classList.toggle("complete", completeNow);
          statusEl.textContent = completeNow ? "Ready" : "Need";
          statusEl.className = "status-dot " + (completeNow ? "ready" : "missing");
        };
        var save = function() {
          state[row.id] = { ready: toggle.checked, have: Math.max(0, Number(input.value||0)) };
          saveState(); sync(true); renderSummary();
        };
        toggle.addEventListener("change", save);
        input.addEventListener("input", save);
        minusBtn.addEventListener("click", function(){ input.value = Math.max(0, Number(input.value||0) - 1); save(); });
        plusBtn.addEventListener("click", function(){ input.value = Number(input.value||0) + 1; save(); });
        return rowEl;
      }
      function renderSections() {
        els.sections.innerHTML = "";
        data.sections.forEach(function(section) {
          var rows = section.rows.filter(isVisible);
          var sectionEl = document.createElement("section");
          sectionEl.className = "section";
          if (!rows.length) { sectionEl.hidden = true; }
          var doneCount = rows.filter(isComplete).length;
          var allDone = doneCount === rows.length && rows.length > 0;
          sectionEl.innerHTML =
            "<header class=\"section-head\">" +
              "<div class=\"sh-left\"><h2>" + esc(section.title) + "</h2><p>" + esc(section.intro) + "</p></div>" +
              "<div class=\"sh-right\">" +
                "<div class=\"count" + (allDone ? " done" : "") + "\">" + doneCount + "/" + rows.length + "</div>" +
                "<div class=\"chevron\">&#9656;</div>" +
              "</div>" +
            "</header>" +
            "<div class=\"rows\"></div>";
          var head = sectionEl.querySelector(".section-head");
          head.addEventListener("click", function(){ sectionEl.classList.toggle("collapsed"); });
          var rowsEl = sectionEl.querySelector(".rows");
          rows.forEach(function(row){ rowsEl.appendChild(renderRow(row)); });
          els.sections.appendChild(sectionEl);
        });
      }
            function renderSummary() {
        const rows = visibleRows();
        const complete = rows.filter(isComplete).length;
        const packed = rows.reduce((sum, row) => sum + Number(rowState(row.id).have || 0), 0);
        const percent = rows.length ? Math.round((complete / rows.length) * 100) : 0;
        els.complete.textContent = String(complete);
        els.visible.textContent = String(rows.length);
        els.percent.textContent = percent + '%';
        els.packed.textContent = String(packed);
        els.fill.style.width = percent + '%';
      }
      function render() { renderFilters(); renderSections(); renderSummary(); }
      document.getElementById('markVisibleReady').addEventListener('click', () => { visibleRows().forEach((row) => { state[row.id] = { ...rowState(row.id), ready: true }; }); saveState(); render(); });
      document.getElementById('clearVisible').addEventListener('click', () => { visibleRows().forEach((row) => { state[row.id] = { ready: false, have: 0 }; }); saveState(); render(); });
      document.getElementById('tooltipClose').addEventListener('click', closeTooltip);
      els.modal.addEventListener('click', (event) => { if (event.target === els.modal) closeTooltip(); });
      document.addEventListener('keydown', (event) => { if (event.key === 'Escape') closeTooltip(); });
      render();
    })();
  </script>
