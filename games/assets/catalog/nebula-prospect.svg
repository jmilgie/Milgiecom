<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#030612"/>
      <stop offset=".5" stop-color="#081224"/>
      <stop offset="1" stop-color="#020711"/>
    </linearGradient>
    <radialGradient id="neb1" cx=".3" cy=".3" r=".4">
      <stop offset="0" stop-color="#00cfff" stop-opacity=".35"/>
      <stop offset="1" stop-color="#00cfff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx=".7" cy=".7" r=".45">
      <stop offset="0" stop-color="#ff6a00" stop-opacity=".25"/>
      <stop offset="1" stop-color="#ff6a00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#ffcc66"/>
      <stop offset=".5" stop-color="#ff6a00"/>
      <stop offset="1" stop-color="#ff6a00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="480" fill="url(#sky)"/>
  <rect width="800" height="480" fill="url(#neb1)"/>
  <rect width="800" height="480" fill="url(#neb2)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="80" cy="60" r="1"/>
    <circle cx="160" cy="120" r="1.3" opacity=".8"/>
    <circle cx="240" cy="80" r="1"/>
    <circle cx="340" cy="200" r="1.2" opacity=".7"/>
    <circle cx="420" cy="50" r="1"/>
    <circle cx="520" cy="140" r="1" opacity=".9"/>
    <circle cx="620" cy="90" r="1.2"/>
    <circle cx="720" cy="240" r="1" opacity=".6"/>
    <circle cx="60" cy="320" r="1" opacity=".8"/>
    <circle cx="180" cy="380" r="1.2"/>
    <circle cx="280" cy="420" r="1"/>
    <circle cx="460" cy="400" r="1.1" opacity=".7"/>
    <circle cx="580" cy="360" r="1"/>
    <circle cx="700" cy="420" r="1.2" opacity=".8"/>
  </g>

  <!-- station silhouette -->
  <g stroke="#00cfff" fill="#0a1828">
    <rect x="120" y="232" width="560" height="10" stroke-opacity=".5"/>
    <polygon points="380,120 420,120 432,232 368,232" stroke-opacity=".6"/>
    <line x1="400" y1="120" x2="400" y2="70" stroke-width="1"/>
    <circle cx="400" cy="66" r="5" fill="#00cfff"/>
    <ellipse cx="210" cy="237" rx="70" ry="36" fill="none" stroke-opacity=".5" stroke-width="2.5"/>
    <polygon points="540,210 620,210 628,272 532,272" stroke="#ff6a00" stroke-opacity=".5"/>
    <rect x="90" y="170" width="18" height="65" stroke-opacity=".45"/>
    <rect x="692" y="170" width="18" height="65" stroke-opacity=".45"/>
    <polygon points="160,260 240,260 250,320 150,320" stroke-opacity=".5"/>
    <polygon points="470,280 570,280 580,324 460,324" stroke-opacity=".5"/>
    <circle cx="540" cy="150" r="22" stroke-opacity=".55"/>
    <circle cx="540" cy="150" r="10" fill="none" stroke-opacity=".5"/>
    <circle cx="540" cy="150" r="3" fill="#00cfff"/>
    <ellipse cx="400" cy="300" rx="90" ry="26" fill="none" stroke="#ff6a00" stroke-opacity=".6"/>
    <ellipse cx="400" cy="300" rx="45" ry="13" fill="url(#core)" stroke="none"/>
  </g>

  <!-- title -->
  <g font-family="ui-monospace, Menlo, Consolas" fill="#e8f7ff">
    <text x="60" y="400" font-size="38" font-weight="900" letter-spacing="6">NEBULA PROSPECT</text>
    <text x="62" y="428" font-size="14" font-weight="700" fill="#00cfff" letter-spacing="4">DEEP-SPACE MINING CONSORTIUM</text>
  </g>
</svg>
