<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Metaphysics No. 1 — Engraved Tablets (Interactive)</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050507;
      --fg: #f6f6f6;
      --accent: #9fb4ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at 50% 20%, #111421 0%, var(--bg) 60%);
      color: var(--fg);
      overflow: hidden;
    }

    #scene-root {
      position: fixed;
      inset: 0;
    }

    .ui {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      pointer-events: none;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(0,0,0,0));
    }

    .ui h1 {
      margin: 0;
      font-size: clamp(1rem, 1.5vw + 0.8rem, 1.6rem);
      line-height: 1.2;
      text-wrap: balance;
    }

    .controls {
      pointer-events: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .controls button,
    .controls a {
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(6, 8, 16, 0.75);
      color: var(--fg);
      text-decoration: none;
      padding: 0.45rem 0.7rem;
      border-radius: 999px;
      font-size: 0.9rem;
      backdrop-filter: blur(6px);
      cursor: pointer;
    }

    .controls button:hover,
    .controls a:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .hint {
      position: fixed;
      bottom: 0.75rem;
      left: 50%;
      transform: translateX(-50%);
      max-width: calc(100vw - 2rem);
      font-size: 0.85rem;
      text-align: center;
      padding: 0.45rem 0.75rem;
      border-radius: 0.7rem;
      background: rgba(8, 10, 22, 0.72);
      border: 1px solid rgba(255,255,255,0.2);
      pointer-events: none;
      z-index: 10;
    }

    #fallback {
      display: none;
      position: fixed;
      inset: 0;
      overflow-y: auto;
      padding: 1rem 1rem 2rem;
      background: linear-gradient(#090a12, #020204);
      z-index: 5;
    }

    #fallback p {
      margin: 0 0 1rem;
      color: #d6d6d6;
    }

    .fallback-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    }

    .fallback-grid img {
      width: 100%;
      border-radius: 0.8rem;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 18px 45px rgba(0,0,0,0.45);
      background: #000;
    }

    body.webgl-disabled {
      overflow: auto;
    }

    body.webgl-disabled #scene-root,
    body.webgl-disabled .hint {
      display: none;
    }

    body.webgl-disabled #fallback {
      display: block;
    }
  </style>
</head>
<body>
  <div class="ui">
    <h1>Visual Metaphysics No. 1 — Engraved Tablets (Interactive)</h1>
    <div class="controls" aria-label="Tablet navigation controls">
      <button type="button" data-focus="0">Left Tablet (1)</button>
      <button type="button" data-focus="1">Center Tablet (2)</button>
      <button type="button" data-focus="2">Right Tablet (3)</button>
      <a href="landing-page.html">Back to Landing</a>
    </div>
  </div>

  <div id="scene-root" aria-hidden="true"></div>

  <p class="hint">Drag to orbit • Pinch / wheel to zoom • Right-drag / two-finger drag to pan • Keys 1–3 jump between tablets</p>

  <section id="fallback" aria-live="polite">
    <p>Your browser does not support WebGL. Showing static tablet images instead.</p>
    <div class="fallback-grid">
      <img src="img/tablet-left.png" alt="Engraved tablet: Left panel" />
      <img src="img/tablet-center.png" alt="Engraved tablet: Center panel" />
      <img src="img/tablet-right.png" alt="Engraved tablet: Right panel" />
    </div>
  </section>

  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.160.0';
    import { OrbitControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const hasWebGL = (() => {
      try {
        const canvas = document.createElement('canvas');
        return !!(window.WebGLRenderingContext && (canvas.getContext('webgl') || canvas.getContext('experimental-webgl')));
      } catch {
        return false;
      }
    })();

    if (!hasWebGL) {
      document.body.classList.add('webgl-disabled');
      throw new Error('WebGL unavailable');
    }

    const root = document.getElementById('scene-root');
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    root.appendChild(renderer.domElement);
    const maxAnisotropy = renderer.capabilities.getMaxAnisotropy();

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x050507, 9, 20);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 120);
    camera.position.set(0, 1.55, 8.2);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 1.15;
    controls.maxDistance = 16;
    controls.zoomSpeed = 1.1;
    controls.enablePan = true;
    controls.target.set(0, 0.2, 0);

    const ambient = new THREE.HemisphereLight(0xcad6ff, 0x111111, 0.55);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(6, 9, 7);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0x88a2ff, 0.4);
    fillLight.position.set(-5, 2, 5);
    scene.add(fillLight);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(16, 80),
      new THREE.MeshStandardMaterial({
        color: 0x06070c,
        roughness: 0.95,
        metalness: 0.05,
      })
    );
    floor.rotation.x = -Math.PI * 0.5;
    floor.position.y = -1.75;
    scene.add(floor);

    const textureLoader = new THREE.TextureLoader();
    const imageFiles = ['img/tablet-left.png', 'img/tablet-center.png', 'img/tablet-right.png'];
    const tabletPositions = [-2.8, 0, 2.8];

    let tablets;
    try {
      tablets = await Promise.all(
        imageFiles.map(async (url, idx) => {
        const engravingMap = await textureLoader.loadAsync(url);
        engravingMap.colorSpace = THREE.SRGBColorSpace;
        engravingMap.wrapS = THREE.ClampToEdgeWrapping;
        engravingMap.wrapT = THREE.ClampToEdgeWrapping;
        engravingMap.anisotropy = maxAnisotropy;

        const roughnessMap = engravingMap.clone();
        roughnessMap.needsUpdate = true;
        roughnessMap.anisotropy = maxAnisotropy;

        const displacementMap = engravingMap.clone();
        displacementMap.needsUpdate = true;
        displacementMap.anisotropy = maxAnisotropy;

        const tabletWidth = 1.85;
        const tabletHeight = 3.5;

        const baseMaterial = new THREE.MeshStandardMaterial({
          color: 0x0d0d10,
          roughness: 0.75,
          metalness: 0.2,
        });

        const textureMaterial = new THREE.MeshPhysicalMaterial({
          map: engravingMap,
          roughnessMap,
          displacementMap,
          displacementScale: 0.02,
          roughness: 0.2,
          metalness: 0.2,
          clearcoat: 0.5,
          clearcoatRoughness: 0.2,
          sheen: 0.08,
          emissive: 0x060606,
          emissiveIntensity: 0.08,
        });
        const tabletGroup = new THREE.Group();
        tabletGroup.position.set(tabletPositions[idx], 0, 0);
        tabletGroup.userData.index = idx;

        const base = new THREE.Mesh(
          new THREE.BoxGeometry(tabletWidth, tabletHeight, 0.24, 1, 1, 1),
          baseMaterial
        );
        tabletGroup.add(base);

        const engravingFace = new THREE.Mesh(
          new THREE.PlaneGeometry(tabletWidth * 0.93, tabletHeight * 0.94, 82, 156),
          textureMaterial
        );
        engravingFace.position.z = 0.122;
        tabletGroup.add(engravingFace);

        const edge = new THREE.Mesh(
          new THREE.BoxGeometry(tabletWidth + 0.05, tabletHeight + 0.05, 0.05),
          new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.45, metalness: 0.5 })
        );
        edge.position.z = -0.14;
        mesh.add(edge);

          scene.add(mesh);
          return mesh;
        })
      );
    } catch (error) {
      console.error('Failed to load tablet textures:', error);
      document.body.classList.add('webgl-disabled');
      throw error;
    }

    const moveState = {
      active: false,
      elapsed: 0,
      duration: 0.52,
      from: {
        camera: new THREE.Vector3(),
        target: new THREE.Vector3(),
      },
      to: {
        camera: new THREE.Vector3(),
        target: new THREE.Vector3(),
      },
    };

    function focusTablet(index) {
      const targetMesh = tablets[index];
      if (!targetMesh) return;

      const target = new THREE.Vector3(targetMesh.position.x, 0.15, 0);
      const offset = new THREE.Vector3(0, 0.72, 3.2);

      moveState.active = true;
      moveState.elapsed = 0;
      moveState.from.camera.copy(camera.position);
      moveState.from.target.copy(controls.target);
      moveState.to.target.copy(target);
      moveState.to.camera.copy(target).add(offset);
    }

    document.querySelectorAll('[data-focus]').forEach((button) => {
      button.addEventListener('click', () => {
        focusTablet(Number(button.getAttribute('data-focus')));
      });
    });

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const pointerDown = { x: 0, y: 0 };

    function raycastFromEvent(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      return raycaster.intersectObjects(clickableTablets, false)[0];
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      pointerDown.x = event.clientX;
      pointerDown.y = event.clientY;
    });

    renderer.domElement.addEventListener('pointerup', (event) => {
      const dragDistance = Math.hypot(event.clientX - pointerDown.x, event.clientY - pointerDown.y);
      if (dragDistance > 8 || event.button !== 0) return;

      const hit = raycastFromEvent(event);
      if (!hit) return;
      focusTablet(hit.object.parent.userData.index);
    });

    renderer.domElement.addEventListener('pointermove', (event) => {
      const hit = raycastFromEvent(event);
      renderer.domElement.style.cursor = hit ? 'pointer' : 'grab';
    });

    renderer.domElement.style.cursor = 'grab';

    window.addEventListener('keydown', (event) => {
      if (event.key === '1') focusTablet(0);
      if (event.key === '2') focusTablet(1);
      if (event.key === '3') focusTablet(2);
      if (event.key === 'ArrowLeft') focusTablet(0);
      if (event.key === 'ArrowRight') focusTablet(2);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      if (moveState.active) {
        moveState.elapsed += delta;
        const t = Math.min(moveState.elapsed / moveState.duration, 1);
        const eased = 1 - Math.pow(1 - t, 3);
        camera.position.lerpVectors(moveState.from.camera, moveState.to.camera, eased);
        controls.target.lerpVectors(moveState.from.target, moveState.to.target, eased);
        if (t >= 1) moveState.active = false;
      }

      controls.update();
      renderer.render(scene, camera);
    }

    focusTablet(1);
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
