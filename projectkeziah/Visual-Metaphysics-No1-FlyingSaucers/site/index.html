<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Metaphysics No. 1 — Explore</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a96e;
      --gold-dim: rgba(201,169,110,0.35);
      --bg: #06070d;
      --fg: #f0ece0;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: "Playfair Display", Georgia, serif;
      color: var(--fg);
    }

    /* ── Top bar ── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 30;
      padding: 0.85rem 1.4rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
      pointer-events: none;
    }
    #topbar h1 {
      font-size: clamp(0.8rem, 1.2vw + 0.5rem, 1.1rem);
      font-weight: 400; letter-spacing: 0.07em;
      color: #e8dfc9; text-shadow: 0 2px 12px rgba(0,0,0,0.9);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .topbar-right { display: flex; align-items: center; gap: 0.6rem; pointer-events: auto; }

    /* ── Pill toggle ── */
    #view-toggle {
      display: flex; align-items: center;
      background: rgba(10,8,4,0.72);
      border: 1px solid var(--gold-dim);
      border-radius: 999px; padding: 3px;
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }
    .toggle-btn {
      background: none; border: none; color: rgba(240,236,224,0.5);
      font-family: inherit; font-size: 0.78rem; letter-spacing: 0.08em;
      padding: 0.35rem 0.85rem; border-radius: 999px;
      cursor: pointer; transition: background 0.25s, color 0.25s;
      white-space: nowrap;
    }
    .toggle-btn.active {
      background: rgba(201,169,110,0.18); color: var(--gold);
      box-shadow: inset 0 0 0 1px rgba(201,169,110,0.4);
    }
    .toggle-btn:hover:not(.active) { color: var(--fg); }

    #back-btn {
      pointer-events: auto;
      background: rgba(10,8,4,0.65); border: 1px solid var(--gold-dim);
      color: var(--gold); font-family: inherit; font-size: 0.78rem;
      letter-spacing: 0.08em; padding: 0.38rem 0.85rem;
      border-radius: 999px; cursor: pointer; backdrop-filter: blur(8px);
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }
    #back-btn:hover { border-color: var(--gold); background: rgba(201,169,110,0.12); color: #f0e0c0; }

    /* ── Shared 3D canvas ── */
    #main-canvas { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }

    /* ── 2D pan/zoom overlay (detail mode) ── */
    #panzoom-overlay {
      position: fixed; inset: 0; z-index: 10;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 40%, #0e0c14 0%, #06070d 70%);
      cursor: grab; display: none;
    }
    #panzoom-overlay.active { display: block; }
    #panzoom-overlay:active { cursor: grabbing; }
    #poster-img {
      position: absolute; top: 0; left: 0; display: block;
      transform-origin: 0 0;
      image-rendering: -webkit-optimize-contrast;
      border: 1px solid rgba(201,169,110,0.1);
      box-shadow: 0 0 120px rgba(0,0,0,0.8);
      will-change: transform;
      user-select: none; -webkit-user-drag: none;
    }

    /* ── UI overlays ── */
    /* Label shown when focused */
    #fp-label {
      position: fixed; bottom: 4.5rem; left: 50%; transform: translateX(-50%);
      text-align: center; pointer-events: none; z-index: 20;
      opacity: 0; transition: opacity 0.5s;
    }
    #fp-label.visible { opacity: 1; }
    #fp-label .name {
      font-size: clamp(0.9rem, 1.8vw + 0.4rem, 1.4rem);
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gold); text-shadow: 0 0 40px rgba(201,169,110,0.5);
    }
    #fp-label .sub { font-size: 0.74rem; color: rgba(240,236,224,0.45); letter-spacing: 0.1em; margin-top: 0.2rem; }

    /* Full-poster close button */
    #fp-close {
      position: fixed; top: 4.5rem; right: 1.4rem; z-index: 20;
      background: rgba(10,8,4,0.6); border: 1px solid var(--gold-dim);
      color: var(--gold); font-family: inherit; font-size: 0.78rem;
      letter-spacing: 0.08em; padding: 0.38rem 0.85rem;
      border-radius: 999px; cursor: pointer; backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s, background 0.2s;
    }
    #fp-close.visible { opacity: 1; pointer-events: auto; }
    #fp-close:hover { background: rgba(201,169,110,0.12); }

    /* "Pan & Zoom" detail button shown when poster is focused */
    #fp-detail-btn {
      position: fixed; top: 4.5rem; left: 1.4rem; z-index: 20;
      background: rgba(10,8,4,0.6); border: 1px solid var(--gold-dim);
      color: var(--gold); font-family: inherit; font-size: 0.78rem;
      letter-spacing: 0.08em; padding: 0.38rem 0.85rem;
      border-radius: 999px; cursor: pointer; backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s, background 0.2s;
    }
    #fp-detail-btn.visible { opacity: 1; pointer-events: auto; }
    #fp-detail-btn:hover { background: rgba(201,169,110,0.12); }

    /* Exit pan mode button */
    #pz-exit-btn {
      position: fixed; top: 4.5rem; left: 1.4rem; z-index: 25;
      background: rgba(10,8,4,0.65); border: 1px solid var(--gold-dim);
      color: var(--gold); font-family: inherit; font-size: 0.78rem;
      letter-spacing: 0.08em; padding: 0.38rem 0.85rem;
      border-radius: 999px; cursor: pointer; backdrop-filter: blur(8px);
      display: none;
      transition: background 0.2s;
    }
    #pz-exit-btn.active { display: block; }
    #pz-exit-btn:hover { background: rgba(201,169,110,0.12); }

    /* Tri-frame UI */
    #tf-label {
      position: fixed; bottom: 4.5rem; left: 50%; transform: translateX(-50%);
      text-align: center; pointer-events: none; z-index: 20;
      opacity: 0; transition: opacity 0.5s;
    }
    #tf-label.visible { opacity: 1; }
    #tf-label .name {
      font-size: clamp(0.9rem, 1.8vw + 0.4rem, 1.4rem);
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gold); text-shadow: 0 0 40px rgba(201,169,110,0.5);
    }
    #tf-label .sub { font-size: 0.74rem; color: rgba(240,236,224,0.45); letter-spacing: 0.1em; margin-top: 0.2rem; }

    .tf-nav {
      position: fixed; top: 50%; transform: translateY(-50%); z-index: 20;
      background: rgba(10,8,4,0.5); border: 1px solid var(--gold-dim);
      color: var(--gold); width: 2.6rem; height: 2.6rem; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.1rem; backdrop-filter: blur(6px);
      transition: opacity 0.4s, border-color 0.2s, background 0.2s, transform 0.2s;
      opacity: 0; pointer-events: none;
    }
    .tf-nav.visible { opacity: 1; pointer-events: auto; }
    .tf-nav:hover { border-color: var(--gold); background: rgba(201,169,110,0.15); transform: translateY(-50%) scale(1.1); }
    #tf-prev { left: 1.2rem; }
    #tf-next { right: 1.2rem; }

    #tf-close {
      position: fixed; top: 4.5rem; right: 1.4rem; z-index: 20;
      background: rgba(10,8,4,0.6); border: 1px solid var(--gold-dim);
      color: var(--gold); font-family: inherit; font-size: 0.78rem;
      letter-spacing: 0.08em; padding: 0.38rem 0.85rem;
      border-radius: 999px; cursor: pointer; backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s, background 0.2s;
    }
    #tf-close.visible { opacity: 1; pointer-events: auto; }
    #tf-close:hover { background: rgba(201,169,110,0.12); }

    #tf-dots {
      position: fixed; bottom: 2.6rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 0.5rem; z-index: 20;
      opacity: 0; pointer-events: none; transition: opacity 0.5s;
    }
    #tf-dots.visible { opacity: 1; }
    .tf-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(201,169,110,0.25); transition: background 0.3s, transform 0.3s;
    }
    .tf-dot.active { background: var(--gold); transform: scale(1.5); }

    /* ── HUD ── */
    #zoom-level {
      position: fixed; bottom: 3.8rem; right: 1.4rem; z-index: 30;
      font-size: 0.7rem; letter-spacing: 0.12em; color: rgba(201,169,110,0.5);
      pointer-events: none; font-variant-numeric: tabular-nums;
      transition: opacity 0.5s; opacity: 0;
    }
    #zoom-level.visible { opacity: 1; }

    #reset-btn {
      position: fixed; bottom: 3.8rem; left: 50%; transform: translateX(-50%);
      z-index: 30; background: rgba(10,8,4,0.65); border: 1px solid var(--gold-dim);
      color: var(--gold); font-family: inherit; font-size: 0.72rem;
      letter-spacing: 0.1em; padding: 0.35rem 0.8rem;
      border-radius: 999px; cursor: pointer; backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s, background 0.2s;
    }
    #reset-btn.visible { opacity: 1; pointer-events: auto; }
    #reset-btn:hover { background: rgba(201,169,110,0.12); }

    #hint {
      position: fixed; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
      font-size: 0.72rem; letter-spacing: 0.07em; color: rgba(240,236,224,0.32);
      pointer-events: none; z-index: 30; white-space: nowrap;
      transition: opacity 0.8s;
    }
    #hint.hidden { opacity: 0; }

    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0; background: var(--bg); z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.2rem;
      transition: opacity 0.7s;
    }
    #loading.fade { opacity: 0; pointer-events: none; }
    #loading-title { font-size: 1rem; letter-spacing: 0.15em; color: var(--gold); text-transform: uppercase; }
    #loading-bar-wrap { width: 200px; height: 2px; background: rgba(201,169,110,0.12); border-radius: 999px; overflow: hidden; }
    #loading-bar { height: 100%; width: 0%; background: linear-gradient(to right, #c9a96e, #f0d090); border-radius: 999px; transition: width 0.25s; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
</head>
<body>

<div id="loading">
  <div id="loading-title">Preparing the chart…</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>

<div id="topbar">
  <h1>Visual Metaphysics No. 1 &mdash; Flying Saucers</h1>
  <div class="topbar-right">
    <div id="view-toggle" role="group" aria-label="View mode">
      <button class="toggle-btn active" id="btn-fullsize" aria-pressed="true">Full Poster</button>
      <button class="toggle-btn" id="btn-tablets" aria-pressed="false">Tri-Framed Poster</button>
    </div>
    <a href="../" id="back-btn">← Back</a>
  </div>
</div>

<!-- Shared 3D canvas -->
<canvas id="main-canvas"></canvas>

<!-- Full-poster UI -->
<div id="fp-label">
  <div class="name">Visual Metaphysics No. 1</div>
  <div class="sub">Flying Saucers — Fred Keziah, 1956</div>
</div>
<button id="fp-close">✕ Overview</button>
<button id="fp-detail-btn">⊕ Pan &amp; Zoom</button>

<!-- Tri-frame UI -->
<div id="tf-label">
  <div class="name" id="tf-name"></div>
  <div class="sub" id="tf-sub"></div>
</div>
<div id="tf-dots">
  <div class="tf-dot" data-i="0"></div>
  <div class="tf-dot" data-i="1"></div>
  <div class="tf-dot" data-i="2"></div>
</div>
<button class="tf-nav" id="tf-prev" aria-label="Previous frame">&#8592;</button>
<button class="tf-nav" id="tf-next" aria-label="Next frame">&#8594;</button>
<button id="tf-close">✕ Overview</button>

<!-- 2D pan/zoom overlay (detail mode for full poster) -->
<div id="panzoom-overlay">
  <img id="poster-img" src="img/fullSize.png" alt="Visual Metaphysics No. 1 — Full Poster" draggable="false" />
</div>
<button id="pz-exit-btn">← Back to 3D</button>

<!-- Shared HUD -->
<div id="zoom-level">100%</div>
<button id="reset-btn">Reset view</button>
<div id="hint">Click the poster to inspect &nbsp;·&nbsp; Drag &amp; scroll to orbit</div>

<script type="module">
import * as THREE from 'https://esm.sh/three@0.160.0';
import { OrbitControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js';

/* ══════════════════════════════════════
   SHARED RENDERER / SCENE / CAMERA
══════════════════════════════════════ */
const canvas = document.getElementById('main-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x06070d);
scene.fog = new THREE.FogExp2(0x06070d, 0.032);

const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.05, 200);
camera.position.set(0, 0.8, 11);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true; controls.dampingFactor = 0.07;
controls.minDistance = 0.4; controls.maxDistance = 22;
controls.zoomSpeed = 0.9; controls.rotateSpeed = 0.6; controls.panSpeed = 0.6;
controls.target.set(0, 0, 0); controls.enabled = false;

// ── Lights (shared) ──
scene.add(new THREE.AmbientLight(0x1a1a2e, 2));
const keyLight = new THREE.DirectionalLight(0xfff3e0, 2.8);
keyLight.position.set(3,7,6); keyLight.castShadow=true;
keyLight.shadow.mapSize.set(2048,2048); keyLight.shadow.bias=-0.002;
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0x8090c0,0.7); fillLight.position.set(-5,3,4); scene.add(fillLight);
const backLight = new THREE.DirectionalLight(0xc9a96e,0.5); backLight.position.set(0,2,-8); scene.add(backLight);

// ── Floor (shared) ──
const floorMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(60,60),
  new THREE.MeshStandardMaterial({color:0x06070c,roughness:0.98})
);
floorMesh.rotation.x=-Math.PI/2; floorMesh.position.y=-2.6; floorMesh.receiveShadow=true;
scene.add(floorMesh);

// ── Particles (shared) ──
const PARTS = 400;
const pPos = new Float32Array(PARTS*3);
for(let i=0;i<PARTS;i++){
  pPos[i*3]=(Math.random()-.5)*24; pPos[i*3+1]=(Math.random()-.5)*10+2; pPos[i*3+2]=(Math.random()-.5)*14;
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos,3));
const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({color:0xc9a96e,size:0.018,sizeAttenuation:true,transparent:true,opacity:0.22,depthWrite:false}));
scene.add(particles);

// ── Easing ──
function outQuint(t){ return 1-Math.pow(1-t,5); }
function outBack(t){ const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }

// ── Camera animation ──
const camAnim = {
  active:false, elapsed:0, duration:1.1,
  fromPos:new THREE.Vector3(), toPos:new THREE.Vector3(),
  fromTgt:new THREE.Vector3(), toTgt:new THREE.Vector3(),
  onDone:null
};
function startCam(toPos,toTgt,dur,onDone){
  camAnim.active=true; camAnim.elapsed=0; camAnim.duration=dur||1.1;
  camAnim.fromPos.copy(camera.position); camAnim.fromTgt.copy(controls.target);
  camAnim.toPos.copy(toPos); camAnim.toTgt.copy(toTgt); camAnim.onDone=onDone||null;
}

/* ══════════════════════════════════════
   TEXTURE LOADING
══════════════════════════════════════ */
// Register panzoom-ready listener BEFORE the texture await.
let _panzoomFired = false;
let _texturesDone = false;
function _tryFinish(){ if(_panzoomFired && _texturesDone) finishLoading(); }
if(window._panzoomReady){ _panzoomFired=true; }
else { window.addEventListener('panzoom-ready',()=>{ _panzoomFired=true; _tryFinish(); },{once:true}); }

const texLoader = new THREE.TextureLoader();
function loadTex(src){
  return new Promise(res=>texLoader.load(src,t=>{
    t.colorSpace=THREE.SRGBColorSpace; t.anisotropy=renderer.capabilities.getMaxAnisotropy(); res(t);
  },undefined,()=>res(new THREE.Texture())));
}

const FRAME_SRCS = ['img/tablet-left.png','img/tablet-center.png','img/tablet-right.png'];
const [fpTex, ...frameTex] = await Promise.all([
  loadTex('img/fullSize.png'),
  ...FRAME_SRCS.map(loadTex)
]);
_texturesDone = true;

/* ══════════════════════════════════════
   FULL POSTER — single wide stone slab
══════════════════════════════════════ */
const FP = { W:7.2, H:4.0, D:0.22 };

const fpGroup = new THREE.Group();
fpGroup.position.set(0, 0, 0);
fpGroup.userData = { basePos:new THREE.Vector3(0,0,0), baseRotY:0, glowTarget:0, glowCurrent:0, glowMat:null };

// Stone body
const fpBody = new THREE.Mesh(
  new THREE.BoxGeometry(FP.W, FP.H, FP.D),
  new THREE.MeshStandardMaterial({color:0x1a1612,roughness:0.88,metalness:0.06})
);
fpBody.castShadow=true; fpBody.receiveShadow=true; fpGroup.add(fpBody);

// Chamfer edges
const fpCMat = new THREE.MeshStandardMaterial({color:0x0e0c09,roughness:0.6,metalness:0.15});
const cs = 0.07;
const fpEdges = [
  new THREE.Mesh(new THREE.BoxGeometry(FP.W+cs*2,cs,FP.D+cs*2),fpCMat),
  new THREE.Mesh(new THREE.BoxGeometry(FP.W+cs*2,cs,FP.D+cs*2),fpCMat),
  new THREE.Mesh(new THREE.BoxGeometry(cs,FP.H,FP.D+cs*2),fpCMat),
  new THREE.Mesh(new THREE.BoxGeometry(cs,FP.H,FP.D+cs*2),fpCMat),
];
fpEdges[0].position.y= FP.H/2+cs/2; fpEdges[1].position.y=-FP.H/2-cs/2;
fpEdges[2].position.x=-FP.W/2-cs/2; fpEdges[3].position.x= FP.W/2+cs/2;
fpEdges.forEach(m=>{m.castShadow=true; fpGroup.add(m);});

// Engraving face (the poster image)
const fpFace = new THREE.Mesh(
  new THREE.PlaneGeometry(FP.W*0.93, FP.H*0.92, 96, 54),
  new THREE.MeshPhysicalMaterial({
    map:fpTex, roughness:0.20, metalness:0.16,
    clearcoat:0.45, clearcoatRoughness:0.18,
    emissive:new THREE.Color(0x1a1008), emissiveIntensity:0.06
  })
);
fpFace.position.z = FP.D/2+0.001; fpGroup.add(fpFace);

// Glow outline
const fpGlowMat = new THREE.MeshBasicMaterial({color:0xc9a96e,transparent:true,opacity:0,depthWrite:false});
const fpGlow = new THREE.Mesh(new THREE.PlaneGeometry(FP.W+0.18,FP.H+0.18),fpGlowMat);
fpGlow.position.z = FP.D/2-0.01; fpGroup.add(fpGlow);
fpGroup.userData.glowMat = fpGlowMat;

// Poster spotlight
const fpSpot = new THREE.PointLight(0xc9a96e,0,8);
fpSpot.position.set(0,0,4); scene.add(fpSpot);

scene.add(fpGroup);

// ── Full-poster state ──
let fpMode = 'overview'; // 'overview' | 'spinning' | 'focused'
const fpSpinAnim = { active:false, elapsed:0, duration:0.9, startRotY:0 };

function fpOverviewCam(){ return { pos:new THREE.Vector3(0,0.6,12), tgt:new THREE.Vector3(0,0,0) }; }
function fpFocusCam(){    return { pos:new THREE.Vector3(0,0,4.5),   tgt:new THREE.Vector3(0,0,0) }; }

function fpFocus(){
  if(fpMode==='spinning'||fpMode==='focused') return;
  fpMode='spinning'; controls.enabled=false;
  fpGroup.userData.glowTarget=0.16;
  fpSpinAnim.active=true; fpSpinAnim.elapsed=0; fpSpinAnim.startRotY=fpGroup.rotation.y;
  const fc=fpFocusCam();
  startCam(fc.pos,fc.tgt,1.05,()=>{
    fpMode='focused'; controls.enabled=true;
    controls.target.copy(fc.tgt); controls.minDistance=0.5; controls.maxDistance=8;
    updateFPUI();
  });
  fpSpot.intensity=2.8;
  updateFPUI();
}

function fpReturnOverview(){
  if(fpMode==='spinning') return;
  fpMode='overview'; controls.enabled=false;
  fpGroup.userData.glowTarget=0; fpSpot.intensity=0;
  const ov=fpOverviewCam();
  startCam(ov.pos,ov.tgt,0.9,()=>{ controls.target.copy(ov.tgt); controls.minDistance=4; controls.maxDistance=22; updateFPUI(); });
  updateFPUI();
}

let fpHintTimer=null;
function updateFPUI(){
  const focused = fpMode==='focused'||fpMode==='spinning';
  document.getElementById('fp-label').classList.toggle('visible', focused);
  document.getElementById('fp-close').classList.toggle('visible', fpMode==='focused');
  document.getElementById('fp-detail-btn').classList.toggle('visible', fpMode==='focused');
  if(focused){
    hintEl.textContent='Drag & scroll to inspect · ⊕ Pan & Zoom for full detail';
    hintEl.classList.remove('hidden');
    clearTimeout(fpHintTimer); fpHintTimer=setTimeout(()=>hintEl.classList.add('hidden'),5000);
  } else {
    hintEl.textContent='Click the poster to inspect · Drag & scroll to orbit';
    hintEl.classList.remove('hidden');
    clearTimeout(fpHintTimer); fpHintTimer=setTimeout(()=>hintEl.classList.add('hidden'),6000);
  }
}

document.getElementById('fp-close').addEventListener('click', fpReturnOverview);
document.getElementById('fp-detail-btn').addEventListener('click', ()=>{ enterPanZoom(); });

// Raycaster for full-poster click
const fpRaycaster=new THREE.Raycaster(), fpNdc=new THREE.Vector2();
const fpDown={x:0,y:0,t:0};
canvas.addEventListener('pointerdown',e=>{ fpDown.x=e.clientX; fpDown.y=e.clientY; fpDown.t=performance.now(); });
canvas.addEventListener('pointerup',e=>{
  if(currentView!=='fullsize') return;
  if(e.button!==0) return;
  if(Math.hypot(e.clientX-fpDown.x,e.clientY-fpDown.y)>9||performance.now()-fpDown.t>400) return;
  const rect=canvas.getBoundingClientRect();
  fpNdc.x=((e.clientX-rect.left)/rect.width)*2-1;
  fpNdc.y=-((e.clientY-rect.top)/rect.height)*2+1;
  fpRaycaster.setFromCamera(fpNdc,camera);
  if(fpRaycaster.intersectObject(fpFace,false).length){ fpFocus(); }
});
canvas.addEventListener('pointermove',e=>{
  if(currentView!=='fullsize') return;
  if(fpMode==='focused'){ canvas.style.cursor='grab'; return; }
  const rect=canvas.getBoundingClientRect();
  fpNdc.x=((e.clientX-rect.left)/rect.width)*2-1;
  fpNdc.y=-((e.clientY-rect.top)/rect.height)*2+1;
  fpRaycaster.setFromCamera(fpNdc,camera);
  canvas.style.cursor=fpRaycaster.intersectObject(fpFace,false).length?'pointer':'grab';
});

/* ══════════════════════════════════════
   TRI-FRAMED POSTER — three stone slabs
══════════════════════════════════════ */
const FRAMES = [
  { src: 'img/tablet-left.png',   name: 'Frame I',   sub: 'Flight Formations' },
  { src: 'img/tablet-center.png', name: 'Frame II',  sub: 'Data Records'      },
  { src: 'img/tablet-right.png',  name: 'Frame III', sub: 'Cosmic Taxonomy'   },
];

const W=2.0, H=3.6, D=0.22, SPREAD=3.6;
const frameGroups=[], clickTargets=[], spotLights=[];

FRAMES.forEach((meta,idx)=>{
  const tex = frameTex[idx];
  const g = new THREE.Group();
  const arc = (idx-1)*0.18;
  g.position.set((idx-1)*SPREAD, 0, -Math.abs(idx-1)*0.35);
  g.rotation.y = -arc;
  g.userData = { index:idx, basePos:g.position.clone(), baseRotY:-arc, glowTarget:0, glowCurrent:0, glowMat:null };

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(W,H,D),
    new THREE.MeshStandardMaterial({color:0x1a1612,roughness:0.88,metalness:0.06})
  );
  body.castShadow=true; body.receiveShadow=true; g.add(body);

  const cMat = new THREE.MeshStandardMaterial({color:0x0e0c09,roughness:0.6,metalness:0.15});
  const cs2 = 0.06;
  const tops = [
    new THREE.Mesh(new THREE.BoxGeometry(W+cs2*2,cs2,D+cs2*2),cMat),
    new THREE.Mesh(new THREE.BoxGeometry(W+cs2*2,cs2,D+cs2*2),cMat),
    new THREE.Mesh(new THREE.BoxGeometry(cs2,H,D+cs2*2),cMat),
    new THREE.Mesh(new THREE.BoxGeometry(cs2,H,D+cs2*2),cMat),
  ];
  tops[0].position.y= H/2+cs2/2; tops[1].position.y=-H/2-cs2/2;
  tops[2].position.x=-W/2-cs2/2; tops[3].position.x= W/2+cs2/2;
  tops.forEach(m=>{m.castShadow=true;g.add(m);});

  const face = new THREE.Mesh(
    new THREE.PlaneGeometry(W*0.9, H*0.92, 64, 115),
    new THREE.MeshPhysicalMaterial({
      map:tex, roughness:0.22, metalness:0.18,
      clearcoat:0.45, clearcoatRoughness:0.18,
      emissive:new THREE.Color(0x1a1008), emissiveIntensity:0.06
    })
  );
  face.position.z = D/2+0.001; g.add(face);
  face.userData.frameIndex = idx; clickTargets.push(face);

  const glowMat = new THREE.MeshBasicMaterial({color:0xc9a96e,transparent:true,opacity:0,depthWrite:false});
  const glow = new THREE.Mesh(new THREE.PlaneGeometry(W+0.14,H+0.14),glowMat);
  glow.position.z = D/2-0.01; g.add(glow);
  g.userData.glowMat = glowMat;

  const spot = new THREE.PointLight(0xc9a96e,0,4);
  spot.position.set((idx-1)*SPREAD,0,3); scene.add(spot); spotLights.push(spot);

  scene.add(g); frameGroups.push(g);
});

// ── Tri-frame state ──
let tfMode = 'overview';
let focusedIdx = -1, hoveredIdx = -1;
const tfSpinAnim = { active:false, idx:-1, elapsed:0, duration:0.85, startRotY:0 };

function tfOverviewCam(){ return {pos:new THREE.Vector3(0,0.8,11),tgt:new THREE.Vector3(0,0,0)}; }
function tfFocusCam(idx){ const g=frameGroups[idx]; return {pos:new THREE.Vector3(g.userData.basePos.x,0.2,3.8),tgt:new THREE.Vector3(g.userData.basePos.x,0,0)}; }

function focusFrame(idx){
  if(tfMode==='spinning') return;
  if(idx===focusedIdx&&tfMode==='focused') return;
  const g=frameGroups[idx];
  tfMode='spinning'; controls.enabled=false;
  g.userData.glowTarget=0.18;
  if(focusedIdx>=0&&focusedIdx!==idx){ frameGroups[focusedIdx].userData.glowTarget=0; spotLights[focusedIdx].intensity=0; }
  tfSpinAnim.active=true; tfSpinAnim.idx=idx; tfSpinAnim.elapsed=0; tfSpinAnim.startRotY=g.rotation.y;
  const fc=tfFocusCam(idx);
  startCam(fc.pos,fc.tgt,1.1,()=>{
    tfMode='focused'; focusedIdx=idx; controls.enabled=true;
    controls.target.copy(fc.tgt); controls.minDistance=0.4; controls.maxDistance=5.5;
    updateTFUI();
  });
  spotLights[idx].intensity=2.2; focusedIdx=idx; updateTFUI();
}

function tfReturnOverview(){
  if(tfMode==='spinning') return;
  tfMode='overview'; controls.enabled=false;
  if(focusedIdx>=0){ frameGroups[focusedIdx].userData.glowTarget=0; spotLights[focusedIdx].intensity=0; }
  focusedIdx=-1;
  const ov=tfOverviewCam();
  startCam(ov.pos,ov.tgt,0.9,()=>{ controls.target.copy(ov.tgt); controls.minDistance=4; controls.maxDistance=22; updateTFUI(); });
  updateTFUI();
}

let tfHintTimer=null;
function updateTFUI(){
  const focused=(tfMode==='focused'||tfMode==='spinning')&&focusedIdx>=0;
  document.getElementById('tf-name').textContent = focused ? FRAMES[focusedIdx].name : '';
  document.getElementById('tf-sub').textContent  = focused ? FRAMES[focusedIdx].sub  : '';
  document.getElementById('tf-label').classList.toggle('visible', focused);
  document.getElementById('tf-dots').classList.toggle('visible', focused);
  document.querySelectorAll('.tf-dot').forEach((d,i)=>d.classList.toggle('active',i===focusedIdx));
  document.getElementById('tf-close').classList.toggle('visible', tfMode==='focused');
  document.getElementById('tf-prev').classList.toggle('visible', tfMode==='focused'&&focusedIdx>0);
  document.getElementById('tf-next').classList.toggle('visible', tfMode==='focused'&&focusedIdx<FRAMES.length-1);
  if(focused){
    hintEl.textContent='Drag · Scroll to zoom · ← → navigate'; hintEl.classList.remove('hidden');
    clearTimeout(tfHintTimer); tfHintTimer=setTimeout(()=>hintEl.classList.add('hidden'),4000);
  } else {
    hintEl.textContent='Click a frame to inspect · Drag & scroll · Keys 1–3'; hintEl.classList.remove('hidden');
    clearTimeout(tfHintTimer); tfHintTimer=setTimeout(()=>hintEl.classList.add('hidden'),6000);
  }
}

// Tri-frame raycaster
const tfRaycaster=new THREE.Raycaster(), tfNdc=new THREE.Vector2();
const tfDown={x:0,y:0,t:0};
canvas.addEventListener('pointerdown',e=>{ tfDown.x=e.clientX; tfDown.y=e.clientY; tfDown.t=performance.now(); });
canvas.addEventListener('pointerup',e=>{
  if(currentView!=='tablets') return;
  if(e.button!==0) return;
  if(Math.hypot(e.clientX-tfDown.x,e.clientY-tfDown.y)>9||performance.now()-tfDown.t>400) return;
  const rect=canvas.getBoundingClientRect();
  tfNdc.x=((e.clientX-rect.left)/rect.width)*2-1;
  tfNdc.y=-((e.clientY-rect.top)/rect.height)*2+1;
  tfRaycaster.setFromCamera(tfNdc,camera);
  const hits=tfRaycaster.intersectObjects(clickTargets,false);
  if(hits.length){ const idx=hits[0].object.userData.frameIndex; if(!(tfMode==='focused'&&focusedIdx===idx)) focusFrame(idx); }
});
canvas.addEventListener('pointermove',e=>{
  if(currentView!=='tablets') return;
  if(tfMode==='focused'){ canvas.style.cursor='grab'; return; }
  const rect=canvas.getBoundingClientRect();
  tfNdc.x=((e.clientX-rect.left)/rect.width)*2-1;
  tfNdc.y=-((e.clientY-rect.top)/rect.height)*2+1;
  tfRaycaster.setFromCamera(tfNdc,camera);
  const hits=tfRaycaster.intersectObjects(clickTargets,false);
  const nh=hits.length?hits[0].object.userData.frameIndex:-1;
  if(nh!==hoveredIdx){
    if(hoveredIdx>=0&&hoveredIdx!==focusedIdx) frameGroups[hoveredIdx].userData.glowTarget=0;
    if(nh>=0&&nh!==focusedIdx) frameGroups[nh].userData.glowTarget=0.07;
    hoveredIdx=nh;
  }
  canvas.style.cursor=nh>=0?'pointer':'grab';
});

document.getElementById('tf-close').addEventListener('click', tfReturnOverview);
document.getElementById('tf-prev').addEventListener('click', ()=>focusedIdx>0&&focusFrame(focusedIdx-1));
document.getElementById('tf-next').addEventListener('click', ()=>focusedIdx<FRAMES.length-1&&focusFrame(focusedIdx+1));

/* ══════════════════════════════════════
   2D PAN/ZOOM ENGINE (detail mode)
══════════════════════════════════════ */
const pzOverlay  = document.getElementById('panzoom-overlay');
const img        = document.getElementById('poster-img');
const zoomEl     = document.getElementById('zoom-level');
const resetBtn   = document.getElementById('reset-btn');
const pzExitBtn  = document.getElementById('pz-exit-btn');
const hintEl     = document.getElementById('hint');

const MIN_SCALE=0.08, MAX_SCALE=10;
let pzScale=1, pzOx=0, pzOy=0;
let pzDragging=false, pzDragX=0, pzDragY=0, pzDragOx=0, pzDragOy=0;
let pzTouches=[], pzPinchStartDist=0, pzPinchStartScale=1;
let pzPinchStartOx=0, pzPinchStartOy=0, pzPinchMidX=0, pzPinchMidY=0;
let pzTouchStartOx=0, pzTouchStartOy=0, pzTouchOriginX=0, pzTouchOriginY=0;
let pzZoomTimer=null, pzHintTimer=null;

window._panzoomReady = false;

function pzCommit(animated){
  img.style.transition=animated?'transform 0.38s cubic-bezier(0.22,1,0.36,1)':'none';
  img.style.transform=`translate(${pzOx}px,${pzOy}px) scale(${pzScale})`;
}
function pzFitToView(animated){
  if(!img.naturalWidth) return;
  const fitScale=Math.min((innerWidth*0.96)/img.naturalWidth,(innerHeight*0.94)/img.naturalHeight);
  pzScale=Math.max(MIN_SCALE,fitScale);
  pzOx=(innerWidth-img.naturalWidth*pzScale)/2;
  pzOy=(innerHeight-img.naturalHeight*pzScale)/2;
  pzCommit(animated); pzUpdateHUD(); resetBtn.classList.remove('visible');
}
function pzClamp(){
  const iw=img.naturalWidth*pzScale,ih=img.naturalHeight*pzScale,pad=80;
  pzOx=Math.max(pad-iw,Math.min(innerWidth-pad,pzOx));
  pzOy=Math.max(pad-ih,Math.min(innerHeight-pad,pzOy));
}
function pzZoomAt(cx,cy,ns){
  ns=Math.max(MIN_SCALE,Math.min(MAX_SCALE,ns));
  const r=ns/pzScale; pzOx=cx-(cx-pzOx)*r; pzOy=cy-(cy-pzOy)*r; pzScale=ns;
  pzClamp(); pzCommit(false); pzUpdateHUD();
}
function pzUpdateHUD(){
  zoomEl.textContent=Math.round(pzScale*100)+'%'; zoomEl.classList.add('visible');
  clearTimeout(pzZoomTimer); pzZoomTimer=setTimeout(()=>zoomEl.classList.remove('visible'),1600);
  const cx=(innerWidth-img.naturalWidth*pzScale)/2,cy=(innerHeight-img.naturalHeight*pzScale)/2;
  resetBtn.classList.toggle('visible',pzScale>1.08||Math.abs(pzOx-cx)>4||Math.abs(pzOy-cy)>4);
}

pzOverlay.addEventListener('pointerdown',e=>{
  if(e.button!==0) return; pzDragging=true;
  pzDragX=e.clientX; pzDragY=e.clientY; pzDragOx=pzOx; pzDragOy=pzOy;
  pzOverlay.setPointerCapture(e.pointerId); pzOverlay.style.cursor='grabbing';
});
pzOverlay.addEventListener('pointermove',e=>{
  if(!pzDragging) return;
  pzOx=pzDragOx+(e.clientX-pzDragX); pzOy=pzDragOy+(e.clientY-pzDragY);
  pzClamp(); pzCommit(false); pzUpdateHUD();
});
pzOverlay.addEventListener('pointerup',()=>{ pzDragging=false; pzOverlay.style.cursor='grab'; });
pzOverlay.addEventListener('wheel',e=>{ e.preventDefault(); pzZoomAt(e.clientX,e.clientY,pzScale*(e.deltaY<0?1.12:1/1.12)); },{passive:false});
pzOverlay.addEventListener('dblclick',e=>{
  const cx=(innerWidth-img.naturalWidth*pzScale)/2,cy=(innerHeight-img.naturalHeight*pzScale)/2;
  if(Math.abs(pzOx-cx)<5&&Math.abs(pzOy-cy)<5&&pzScale<1.1||pzScale>3){ pzFitToView(true); return; }
  pzZoomAt(e.clientX,e.clientY,Math.min(pzScale*2.8,MAX_SCALE));
  img.style.transition='transform 0.42s cubic-bezier(0.22,1,0.36,1)';
  img.style.transform=`translate(${pzOx}px,${pzOy}px) scale(${pzScale})`;
});
pzOverlay.addEventListener('touchstart',e=>{
  e.preventDefault(); pzTouches=Array.from(e.touches);
  if(pzTouches.length===1){ pzDragging=true; pzTouchOriginX=pzTouches[0].clientX; pzTouchOriginY=pzTouches[0].clientY; pzTouchStartOx=pzOx; pzTouchStartOy=pzOy; }
  else if(pzTouches.length===2){
    pzDragging=false;
    pzPinchStartDist=Math.hypot(pzTouches[1].clientX-pzTouches[0].clientX,pzTouches[1].clientY-pzTouches[0].clientY);
    pzPinchStartScale=pzScale; pzPinchStartOx=pzOx; pzPinchStartOy=pzOy;
    pzPinchMidX=(pzTouches[0].clientX+pzTouches[1].clientX)/2; pzPinchMidY=(pzTouches[0].clientY+pzTouches[1].clientY)/2;
  }
},{passive:false});
pzOverlay.addEventListener('touchmove',e=>{
  e.preventDefault(); const cur=Array.from(e.touches);
  if(cur.length===1&&pzDragging){ pzOx=pzTouchStartOx+(cur[0].clientX-pzTouchOriginX); pzOy=pzTouchStartOy+(cur[0].clientY-pzTouchOriginY); pzClamp();pzCommit(false);pzUpdateHUD(); }
  else if(cur.length===2&&pzPinchStartDist>0){
    const d=Math.hypot(cur[1].clientX-cur[0].clientX,cur[1].clientY-cur[0].clientY);
    const ns=Math.max(MIN_SCALE,Math.min(MAX_SCALE,pzPinchStartScale*(d/pzPinchStartDist)));
    const r=ns/pzPinchStartScale; pzOx=pzPinchMidX-(pzPinchMidX-pzPinchStartOx)*r; pzOy=pzPinchMidY-(pzPinchMidY-pzPinchStartOy)*r; pzScale=ns;
    pzClamp();pzCommit(false);pzUpdateHUD(); pzTouches=cur;
  }
},{passive:false});
pzOverlay.addEventListener('touchend',e=>{
  pzTouches=Array.from(e.touches);
  if(!pzTouches.length){ pzDragging=false; pzPinchStartDist=0; }
  else if(pzTouches.length===1){ pzPinchStartDist=0; pzDragging=true; pzTouchOriginX=pzTouches[0].clientX; pzTouchOriginY=pzTouches[0].clientY; pzTouchStartOx=pzOx; pzTouchStartOy=pzOy; }
},{passive:true});

window.addEventListener('keydown',e=>{
  if(!pzOverlay.classList.contains('active')) return;
  const s=80;
  if(e.key==='ArrowLeft'){ pzOx+=s; pzClamp();pzCommit(true);pzUpdateHUD(); }
  if(e.key==='ArrowRight'){ pzOx-=s; pzClamp();pzCommit(true);pzUpdateHUD(); }
  if(e.key==='ArrowUp'){ pzOy+=s; pzClamp();pzCommit(true);pzUpdateHUD(); }
  if(e.key==='ArrowDown'){ pzOy-=s; pzClamp();pzCommit(true);pzUpdateHUD(); }
  if(e.key==='+'||e.key==='=') pzZoomAt(innerWidth/2,innerHeight/2,pzScale*1.25);
  if(e.key==='-') pzZoomAt(innerWidth/2,innerHeight/2,pzScale/1.25);
  if(e.key==='0') pzFitToView(true);
  if(e.key==='Escape') exitPanZoom();
});
window.addEventListener('resize',()=>{ if(pzOverlay.classList.contains('active')) pzFitToView(false); });
resetBtn.addEventListener('click',()=>pzFitToView(true));

// Image ready
function onImgReady(){
  img.style.width=img.naturalWidth+'px';
  img.style.height=img.naturalHeight+'px';
  pzFitToView(false);
  window._panzoomReady=true;
  document.getElementById('loading-bar').style.width='60%';
  window.dispatchEvent(new Event('panzoom-ready'));
}
if(img.complete&&img.naturalWidth>0) onImgReady();
else{ img.addEventListener('load',onImgReady); img.addEventListener('error',()=>window.dispatchEvent(new Event('panzoom-ready'))); }

// Faux progress while image loads
let lp=0;
const lt=setInterval(()=>{ lp=Math.min(lp+Math.random()*0.08,0.55); document.getElementById('loading-bar').style.width=(lp*100)+'%'; if(img.complete)clearInterval(lt); },120);

function enterPanZoom(){
  pzOverlay.classList.add('active');
  pzExitBtn.classList.add('active');
  document.getElementById('fp-detail-btn').classList.remove('visible');
  document.getElementById('fp-close').classList.remove('visible');
  document.getElementById('fp-label').classList.remove('visible');
  resetBtn.classList.remove('visible');
  zoomEl.classList.remove('visible');
  pzFitToView(false);
  hintEl.textContent='Drag to pan · Scroll/pinch to zoom · Double-click · 0 to reset · Esc to return';
  hintEl.classList.remove('hidden');
  clearTimeout(pzHintTimer); pzHintTimer=setTimeout(()=>hintEl.classList.add('hidden'),6000);
}
function exitPanZoom(){
  pzOverlay.classList.remove('active');
  pzExitBtn.classList.remove('active');
  resetBtn.classList.remove('visible');
  zoomEl.classList.remove('visible');
  updateFPUI();
}
pzExitBtn.addEventListener('click', exitPanZoom);

/* ══════════════════════════════════════
   VIEW SWITCHER
══════════════════════════════════════ */
let currentView = 'fullsize';

const btnFull = document.getElementById('btn-fullsize');
const btnTab  = document.getElementById('btn-tablets');

function setView(v){
  currentView = v;
  const isFull = v==='fullsize';
  btnFull.classList.toggle('active', isFull);
  btnFull.setAttribute('aria-pressed', isFull);
  btnTab.classList.toggle('active', !isFull);
  btnTab.setAttribute('aria-pressed', !isFull);

  // Hide all scene objects first, then show relevant ones
  fpGroup.visible    = isFull;
  fpSpot.visible     = isFull;
  frameGroups.forEach(g=>g.visible=!isFull);
  spotLights.forEach(s=>s.visible=!isFull);

  // Hide all UI
  ['fp-label','fp-close','fp-detail-btn','tf-label','tf-dots','tf-prev','tf-next','tf-close'].forEach(id=>{
    document.getElementById(id)?.classList.remove('visible');
  });
  resetBtn.classList.remove('visible');
  zoomEl.classList.remove('visible');
  if(pzOverlay.classList.contains('active')) exitPanZoom();

  if(isFull){
    // Reset full poster to overview
    fpMode='overview'; controls.enabled=false;
    fpGroup.userData.glowTarget=0; fpSpot.intensity=0;
    fpGroup.rotation.y=0;
    const ov=fpOverviewCam();
    camera.position.copy(ov.pos); controls.target.copy(ov.tgt);
    controls.minDistance=4; controls.maxDistance=22;
    updateFPUI();
  } else {
    // Reset tri-frame to overview
    tfMode='overview'; controls.enabled=false;
    focusedIdx=-1; hoveredIdx=-1;
    frameGroups.forEach(g=>{ g.userData.glowTarget=0; });
    spotLights.forEach(s=>{ s.intensity=0; });
    const ov=tfOverviewCam();
    camera.position.copy(ov.pos); controls.target.copy(ov.tgt);
    controls.minDistance=4; controls.maxDistance=22;
    updateTFUI();
  }
}

btnFull.addEventListener('click',()=>setView('fullsize'));
btnTab.addEventListener('click', ()=>setView('tablets'));

window.addEventListener('keydown',e=>{
  if(pzOverlay.classList.contains('active')) return;
  if(e.key==='Tab'){ e.preventDefault(); setView(currentView==='fullsize'?'tablets':'fullsize'); }
  if(currentView==='tablets'){
    if(e.key==='1') focusFrame(0);
    if(e.key==='2') focusFrame(1);
    if(e.key==='3') focusFrame(2);
    if(e.key==='Escape') tfReturnOverview();
    if(e.key==='ArrowLeft'&&tfMode==='focused'&&focusedIdx>0) focusFrame(focusedIdx-1);
    if(e.key==='ArrowRight'&&tfMode==='focused'&&focusedIdx<FRAMES.length-1) focusFrame(focusedIdx+1);
  }
  if(currentView==='fullsize'){
    if(e.key==='Escape') fpReturnOverview();
    if(e.key==='Enter'||e.key===' ') fpFocus();
  }
});

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

/* ══════════════════════════════════════
   RENDER LOOP
══════════════════════════════════════ */
const clock=new THREE.Clock(); let time=0;
function animate(){
  requestAnimationFrame(animate);
  const delta=Math.min(clock.getDelta(),0.05); time+=delta;

  // Camera animation
  if(camAnim.active){
    camAnim.elapsed+=delta; const t=Math.min(camAnim.elapsed/camAnim.duration,1);
    camera.position.lerpVectors(camAnim.fromPos,camAnim.toPos,outQuint(t));
    controls.target.lerpVectors(camAnim.fromTgt,camAnim.toTgt,outQuint(t));
    if(t>=1){ camAnim.active=false; if(camAnim.onDone) camAnim.onDone(); }
  }

  // Full-poster animations
  if(fpGroup.visible){
    // Intro spin
    if(fpSpinAnim.active){
      fpSpinAnim.elapsed+=delta; const t=Math.min(fpSpinAnim.elapsed/fpSpinAnim.duration,1);
      fpGroup.rotation.y=fpSpinAnim.startRotY+Math.PI*2*1.5*outBack(t);
      if(t>=1){ fpGroup.rotation.y=fpGroup.userData.baseRotY; fpSpinAnim.active=false; }
    }
    // Idle float (only in overview)
    if(fpMode==='overview'&&!fpSpinAnim.active){
      fpGroup.position.y=fpGroup.userData.basePos.y+Math.sin(time*0.5)*0.07;
      fpGroup.rotation.z=Math.sin(time*0.35)*0.008;
      fpGroup.rotation.y=fpGroup.userData.baseRotY+Math.sin(time*0.22)*0.018;
    }
    // Glow
    const gd=fpGroup.userData;
    gd.glowCurrent+=(gd.glowTarget-gd.glowCurrent)*0.08;
    gd.glowMat.opacity=gd.glowCurrent;
    // Spotlight
    const fpSpotTgt=(fpMode==='focused')?2.8:0;
    fpSpot.intensity+=(fpSpotTgt-fpSpot.intensity)*0.05;
  }

  // Tri-frame animations
  if(frameGroups.length&&frameGroups[0].visible){
    if(tfSpinAnim.active){
      tfSpinAnim.elapsed+=delta; const t=Math.min(tfSpinAnim.elapsed/tfSpinAnim.duration,1);
      const g=frameGroups[tfSpinAnim.idx];
      g.rotation.y=tfSpinAnim.startRotY+Math.PI*2*1.5*outBack(t);
      if(t>=1){ g.rotation.y=g.userData.baseRotY; tfSpinAnim.active=false; }
    }
    frameGroups.forEach((g,i)=>{
      if(tfSpinAnim.active&&tfSpinAnim.idx===i) return;
      if(tfMode==='focused'&&focusedIdx===i) return;
      const ph=i*1.2;
      g.position.y=g.userData.basePos.y+Math.sin(time*0.55+ph)*0.06;
      g.rotation.z=Math.sin(time*0.38+ph)*0.012;
      if(tfMode==='overview') g.rotation.y=g.userData.baseRotY+Math.sin(time*0.25+ph)*0.025;
      const gd=g.userData;
      gd.glowCurrent+=(gd.glowTarget-gd.glowCurrent)*0.08;
      gd.glowMat.opacity=gd.glowCurrent;
    });
    frameGroups.forEach((_,i)=>{
      const tgt=(i===focusedIdx&&tfMode==='focused')?2.2:0;
      spotLights[i].intensity+=(tgt-spotLights[i].intensity)*0.05;
    });
  }

  // Shared particles
  const pp=pGeo.attributes.position.array;
  for(let i=0;i<PARTS;i++){
    pp[i*3+1]-=delta*(0.04+Math.sin(i)*0.02);
    if(pp[i*3+1]<-4) pp[i*3+1]=8+Math.random()*2;
    pp[i*3]+=Math.sin(time*0.2+i*0.7)*0.0015;
  }
  pGeo.attributes.position.needsUpdate=true;

  controls.update();
  renderer.render(scene,camera);
}
animate();

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
function finishLoading(){
  document.getElementById('loading-bar').style.width='100%';
  const loadingEl=document.getElementById('loading');
  setTimeout(()=>{ loadingEl.classList.add('fade'); setTimeout(()=>loadingEl.remove(),700); },250);
  const initView=new URLSearchParams(location.search).get('view')||'fullsize';
  setView(initView==='tablets'?'tablets':'fullsize');
}

_tryFinish();
</script>
