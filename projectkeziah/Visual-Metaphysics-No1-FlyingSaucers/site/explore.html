<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Metaphysics No. 1 — Explore</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a96e;
      --gold-dim: rgba(201,169,110,0.35);
      --bg: #06070d;
      --fg: #f0ece0;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: "Playfair Display", Georgia, serif;
      color: var(--fg);
    }

    /* ── Top bar ── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 30;
      padding: 0.85rem 1.4rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
      pointer-events: none;
    }
    #topbar h1 {
      font-size: clamp(0.8rem, 1.2vw + 0.5rem, 1.1rem);
      font-weight: 400; letter-spacing: 0.07em;
      color: #e8dfc9; text-shadow: 0 2px 12px rgba(0,0,0,0.9);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .topbar-right { display: flex; align-items: center; gap: 0.6rem; pointer-events: auto; }

    /* ── Pill toggle ── */
    #view-toggle {
      display: flex; align-items: center;
      background: rgba(10,8,4,0.72);
      border: 1px solid var(--gold-dim);
      border-radius: 999px; padding: 3px;
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }
    .toggle-btn {
      background: none; border: none; color: rgba(240,236,224,0.5);
      font-family: inherit; font-size: 0.78rem; letter-spacing: 0.08em;
      padding: 0.35rem 0.85rem; border-radius: 999px;
      cursor: pointer; transition: background 0.25s, color 0.25s;
      white-space: nowrap;
    }
    .toggle-btn.active {
      background: rgba(201,169,110,0.18); color: var(--gold);
      box-shadow: inset 0 0 0 1px rgba(201,169,110,0.4);
    }
    .toggle-btn:hover:not(.active) { color: var(--fg); }

    #back-btn {
      pointer-events: auto;
      background: rgba(10,8,4,0.65); border: 1px solid var(--gold-dim);
      color: var(--gold); font-family: inherit; font-size: 0.78rem;
      letter-spacing: 0.08em; padding: 0.38rem 0.85rem;
      border-radius: 999px; cursor: pointer; backdrop-filter: blur(8px);
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }
    #back-btn:hover { border-color: var(--gold); background: rgba(201,169,110,0.12); color: #f0e0c0; }

    /* ── Fullsize viewer ── */
    #fullsize-viewer {
      position: fixed; inset: 0;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 40%, #0e0c14 0%, #06070d 70%);
      cursor: grab;
    }
    #fullsize-viewer:active { cursor: grabbing; }
    #fullsize-viewer.hidden { display: none; }

    /* The image sits at absolute 0,0; transform moves it into view */
    #poster-img {
      position: absolute;
      top: 0; left: 0;
      display: block;
      transform-origin: 0 0;
      /* width/height set by JS to natural dimensions */
      image-rendering: -webkit-optimize-contrast;
      border: 1px solid rgba(201,169,110,0.1);
      box-shadow: 0 0 120px rgba(0,0,0,0.8);
      will-change: transform;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ── Tablets view ── */
    #tablets-view {
      position: fixed; inset: 0;
    }
    #tablets-view.hidden { display: none; }
    #tablets-frame { width: 100%; height: 100%; border: none; }

    /* ── HUD elements ── */
    #zoom-level {
      position: fixed; bottom: 3.8rem; right: 1.4rem; z-index: 30;
      font-size: 0.7rem; letter-spacing: 0.12em; color: rgba(201,169,110,0.5);
      pointer-events: none; font-variant-numeric: tabular-nums;
      transition: opacity 0.5s;
    }
    #zoom-level.hidden { opacity: 0; }

    #reset-btn {
      position: fixed; bottom: 3.8rem; left: 50%; transform: translateX(-50%);
      z-index: 30; background: rgba(10,8,4,0.65); border: 1px solid var(--gold-dim);
      color: var(--gold); font-family: inherit; font-size: 0.72rem;
      letter-spacing: 0.1em; padding: 0.35rem 0.8rem;
      border-radius: 999px; cursor: pointer; backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s, background 0.2s;
    }
    #reset-btn.visible { opacity: 1; pointer-events: auto; }
    #reset-btn:hover { background: rgba(201,169,110,0.12); }

    #hint {
      position: fixed; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
      font-size: 0.72rem; letter-spacing: 0.07em; color: rgba(240,236,224,0.32);
      pointer-events: none; z-index: 30; white-space: nowrap;
      transition: opacity 0.8s;
    }
    #hint.hidden { opacity: 0; }

    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0; background: var(--bg); z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.2rem;
      transition: opacity 0.7s;
    }
    #loading.fade { opacity: 0; pointer-events: none; }
    #loading-title { font-size: 1rem; letter-spacing: 0.15em; color: var(--gold); text-transform: uppercase; }
    #loading-bar-wrap { width: 200px; height: 2px; background: rgba(201,169,110,0.12); border-radius: 999px; overflow: hidden; }
    #loading-bar { height: 100%; width: 0%; background: linear-gradient(to right, #c9a96e, #f0d090); border-radius: 999px; transition: width 0.25s; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
</head>
<body>

<div id="loading">
  <div id="loading-title">Preparing the chart…</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>

<div id="topbar">
  <h1>Visual Metaphysics No. 1 &mdash; Flying Saucers</h1>
  <div class="topbar-right">
    <div id="view-toggle" role="group" aria-label="View mode">
      <button class="toggle-btn active" id="btn-fullsize" aria-pressed="true">Full Poster</button>
      <button class="toggle-btn" id="btn-tablets" aria-pressed="false">3D Tablets</button>
    </div>
    <a href="landing-page.html" id="back-btn">← Back</a>
  </div>
</div>

<!-- Fullsize pan/zoom viewer — image positioned absolutely inside -->
<div id="fullsize-viewer">
  <img id="poster-img" src="img/fullSize.png" alt="Visual Metaphysics No. 1 — Full Poster" draggable="false" />
</div>

<!-- Tablets embedded view -->
<div id="tablets-view" class="hidden"></div>

<div id="zoom-level" class="hidden">100%</div>
<button id="reset-btn">Reset view</button>
<div id="hint">Drag to pan &nbsp;·&nbsp; Scroll or pinch to zoom &nbsp;·&nbsp; Double-click to zoom in</div>

<script>
(function () {
  'use strict';

  /* ── Elements ── */
  const viewer     = document.getElementById('fullsize-viewer');
  const tabletsDiv = document.getElementById('tablets-view');
  const img        = document.getElementById('poster-img');
  const btnFull    = document.getElementById('btn-fullsize');
  const btnTab     = document.getElementById('btn-tablets');
  const hintEl     = document.getElementById('hint');
  const zoomEl     = document.getElementById('zoom-level');
  const resetBtn   = document.getElementById('reset-btn');
  const loadingEl  = document.getElementById('loading');
  const loadingBar = document.getElementById('loading-bar');

  /* ── Pan/zoom state ── */
  const MIN_SCALE = 0.1;
  const MAX_SCALE = 10;
  let scale = 1;
  let ox = 0, oy = 0; // image origin offset (top-left corner position in viewport coords)

  /* ── Current view ── */
  let currentView = 'fullsize';
  let tabletsLoaded = false;
  let hintTimer = null;
  let zoomTimer = null;

  /* ── Apply transform directly on the img ── */
  function commit(animated) {
    img.style.transition = animated ? 'transform 0.38s cubic-bezier(0.22,1,0.36,1)' : 'none';
    img.style.transform = `translate(${ox}px, ${oy}px) scale(${scale})`;
  }

  /* ── Fit image to viewport ── */
  function fitToView(animated) {
    if (!img.naturalWidth || !img.naturalHeight) return;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    // Use 90% of viewport, leaving room for topbar
    const fitScale = Math.min(
      (vw * 0.94) / img.naturalWidth,
      (vh * 0.90) / img.naturalHeight
    );
    scale = Math.max(MIN_SCALE, fitScale);
    // Center in viewport
    ox = (vw - img.naturalWidth * scale) / 2;
    oy = (vh - img.naturalHeight * scale) / 2;
    commit(animated);
    updateHUD();
    resetBtn.classList.remove('visible');
  }

  /* ── Clamp pan so image can't fly completely off-screen ── */
  function clamp() {
    const iw = img.naturalWidth  * scale;
    const ih = img.naturalHeight * scale;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const pad = 80; // px of image that must stay visible
    ox = Math.max(pad - iw, Math.min(vw - pad, ox));
    oy = Math.max(pad - ih, Math.min(vh - pad, oy));
  }

  /* ── Zoom around a viewport point (cx, cy) ── */
  function zoomAt(cx, cy, newScale) {
    newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));
    // Keep the image point under (cx,cy) fixed
    const ratio = newScale / scale;
    ox = cx - (cx - ox) * ratio;
    oy = cy - (cy - oy) * ratio;
    scale = newScale;
    clamp();
    commit(false);
    updateHUD();
  }

  /* ── HUD ── */
  function updateHUD() {
    zoomEl.textContent = Math.round(scale * 100) + '%';
    zoomEl.classList.remove('hidden');
    clearTimeout(zoomTimer);
    zoomTimer = setTimeout(() => zoomEl.classList.add('hidden'), 1600);
    const panned = Math.abs(ox - (window.innerWidth  - img.naturalWidth  * scale) / 2) > 4 ||
                   Math.abs(oy - (window.innerHeight - img.naturalHeight * scale) / 2) > 4;
    resetBtn.classList.toggle('visible', scale > 1.08 || panned);
  }

  /* ── View switching ── */
  function setView(v) {
    currentView = v;
    btnFull.classList.toggle('active', v === 'fullsize');
    btnFull.setAttribute('aria-pressed', v === 'fullsize');
    btnTab.classList.toggle('active',  v === 'tablets');
    btnTab.setAttribute('aria-pressed', v === 'tablets');

    if (v === 'fullsize') {
      viewer.classList.remove('hidden');
      tabletsDiv.classList.add('hidden');
      hintEl.textContent = 'Drag to pan  ·  Scroll or pinch to zoom  ·  Double-click to zoom in  ·  0 to reset';
      hintEl.classList.remove('hidden');
      clearTimeout(hintTimer);
      hintTimer = setTimeout(() => hintEl.classList.add('hidden'), 5500);
    } else {
      viewer.classList.add('hidden');
      tabletsDiv.classList.remove('hidden');
      hintEl.classList.add('hidden');
      zoomEl.classList.add('hidden');
      resetBtn.classList.remove('visible');
      if (!tabletsLoaded) {
        tabletsLoaded = true;
        const iframe = document.createElement('iframe');
        iframe.id = 'tablets-frame';
        iframe.src = 'tablets.html?embed=1';
        iframe.title = '3D Tablets';
        iframe.style.cssText = 'width:100%;height:100%;border:none;';
        tabletsDiv.appendChild(iframe);
      }
    }
  }

  btnFull.addEventListener('click', () => setView('fullsize'));
  btnTab.addEventListener('click',  () => setView('tablets'));
  resetBtn.addEventListener('click', () => fitToView(true));

  /* ── Mouse drag ── */
  let dragging = false;
  let dragX = 0, dragY = 0, dragOx = 0, dragOy = 0;

  viewer.addEventListener('pointerdown', e => {
    if (e.button !== 0) return;
    dragging = true;
    dragX = e.clientX; dragY = e.clientY;
    dragOx = ox; dragOy = oy;
    viewer.setPointerCapture(e.pointerId);
    viewer.style.cursor = 'grabbing';
  });

  viewer.addEventListener('pointermove', e => {
    if (!dragging) return;
    ox = dragOx + (e.clientX - dragX);
    oy = dragOy + (e.clientY - dragY);
    clamp();
    commit(false);
    updateHUD();
  });

  viewer.addEventListener('pointerup', () => {
    dragging = false;
    viewer.style.cursor = 'grab';
  });

  /* ── Wheel zoom ── */
  viewer.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    zoomAt(e.clientX, e.clientY, scale * factor);
  }, { passive: false });

  /* ── Double-click zoom ── */
  viewer.addEventListener('dblclick', e => {
    const centerX = (window.innerWidth  - img.naturalWidth  * scale) / 2;
    const centerY = (window.innerHeight - img.naturalHeight * scale) / 2;
    const atCenter = Math.abs(ox - centerX) < 5 && Math.abs(oy - centerY) < 5 && scale < 1.1;
    if (atCenter || scale > 3) {
      fitToView(true);
    } else {
      const ns = Math.min(scale * 2.8, MAX_SCALE);
      zoomAt(e.clientX, e.clientY, ns);
      img.style.transition = 'transform 0.42s cubic-bezier(0.22,1,0.36,1)';
      img.style.transform = `translate(${ox}px, ${oy}px) scale(${scale})`;
    }
  });

  /* ── Touch (pinch + pan) ── */
  let touches = [];
  let pinchStartDist = 0, pinchStartScale = 0;
  let pinchStartOx = 0, pinchStartOy = 0;
  let pinchMidX = 0, pinchMidY = 0;
  let touchStartOx = 0, touchStartOy = 0;
  let touchOriginX = 0, touchOriginY = 0;

  viewer.addEventListener('touchstart', e => {
    e.preventDefault();
    touches = Array.from(e.touches);
    if (touches.length === 1) {
      dragging = true;
      touchOriginX = touches[0].clientX; touchOriginY = touches[0].clientY;
      touchStartOx = ox; touchStartOy = oy;
    } else if (touches.length === 2) {
      dragging = false;
      pinchStartDist = Math.hypot(
        touches[1].clientX - touches[0].clientX,
        touches[1].clientY - touches[0].clientY
      );
      pinchStartScale = scale;
      pinchStartOx = ox; pinchStartOy = oy;
      pinchMidX = (touches[0].clientX + touches[1].clientX) / 2;
      pinchMidY = (touches[0].clientY + touches[1].clientY) / 2;
    }
  }, { passive: false });

  viewer.addEventListener('touchmove', e => {
    e.preventDefault();
    const cur = Array.from(e.touches);
    if (cur.length === 1 && dragging) {
      ox = touchStartOx + (cur[0].clientX - touchOriginX);
      oy = touchStartOy + (cur[0].clientY - touchOriginY);
      clamp(); commit(false); updateHUD();
    } else if (cur.length === 2 && pinchStartDist > 0) {
      const dist = Math.hypot(
        cur[1].clientX - cur[0].clientX,
        cur[1].clientY - cur[0].clientY
      );
      const ns = Math.max(MIN_SCALE, Math.min(MAX_SCALE, pinchStartScale * (dist / pinchStartDist)));
      // Scale around pinch midpoint
      const ratio = ns / pinchStartScale;
      ox = pinchMidX - (pinchMidX - pinchStartOx) * ratio;
      oy = pinchMidY - (pinchMidY - pinchStartOy) * ratio;
      scale = ns;
      clamp(); commit(false); updateHUD();
    }
  }, { passive: false });

  viewer.addEventListener('touchend', e => {
    touches = Array.from(e.touches);
    if (touches.length === 0) {
      dragging = false;
      pinchStartDist = 0;
    } else if (touches.length === 1) {
      // Switching from pinch to single-finger pan
      pinchStartDist = 0;
      dragging = true;
      touchOriginX = touches[0].clientX; touchOriginY = touches[0].clientY;
      touchStartOx = ox; touchStartOy = oy;
    }
  }, { passive: true });

  /* ── Keyboard ── */
  window.addEventListener('keydown', e => {
    if (currentView !== 'fullsize') return;
    const step = 80;
    switch (e.key) {
      case 'ArrowLeft':  ox += step; clamp(); commit(true); updateHUD(); break;
      case 'ArrowRight': ox -= step; clamp(); commit(true); updateHUD(); break;
      case 'ArrowUp':    oy += step; clamp(); commit(true); updateHUD(); break;
      case 'ArrowDown':  oy -= step; clamp(); commit(true); updateHUD(); break;
      case '+': case '=': zoomAt(innerWidth/2, innerHeight/2, scale * 1.25); break;
      case '-': zoomAt(innerWidth/2, innerHeight/2, scale / 1.25); break;
      case '0': fitToView(true); break;
      case 'Tab': e.preventDefault(); setView(currentView === 'fullsize' ? 'tablets' : 'fullsize'); break;
    }
  });

  /* ── Resize ── */
  window.addEventListener('resize', () => fitToView(false));

  /* ── Image ready ── */
  function onReady() {
    loadingBar.style.width = '100%';
    // Set img element to its natural pixel size — transform will scale/position it
    img.style.width  = img.naturalWidth  + 'px';
    img.style.height = img.naturalHeight + 'px';
    fitToView(false);

    // Read URL param AFTER image is ready so naturalWidth is known
    const initView = new URLSearchParams(location.search).get('view') || 'fullsize';
    setView(initView);

    setTimeout(() => {
      loadingEl.classList.add('fade');
      setTimeout(() => loadingEl.remove(), 700);
    }, 200);
  }

  if (img.complete && img.naturalWidth > 0) {
    onReady();
  } else {
    img.addEventListener('load', onReady);
    img.addEventListener('error', () => {
      loadingEl.classList.add('fade');
      setTimeout(() => loadingEl.remove(), 700);
      viewer.innerHTML = '<p style="color:rgba(240,236,224,0.3);font-size:0.9rem;letter-spacing:0.07em;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">Could not load fullSize.png</p>';
    });
    // Simulated progress
    let p = 0;
    const t = setInterval(() => {
      p = Math.min(p + Math.random() * 0.1, 0.9);
      loadingBar.style.width = (p * 100) + '%';
      if (img.complete) clearInterval(t);
    }, 100);
  }
})();
</script>
</body>
</html>
